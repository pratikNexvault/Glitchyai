<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>My AI — Personal AI OS</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;height:100vh;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:#f4f7f2}

/* Forest Green Tokens */
:root{
  --bg:       #f4f7f2;
  --bg2:      #edf2ea;
  --bg3:      #e2ebe0;
  --green:    #3a7d5c;
  --green-l:  #5aa87a;
  --green-s:  #dff0e8;
  --sage:     #7a9e8a;
  --sage-l:   #a8c4b0;
  --sage-s:   #eaf3ee;
  --warm:     #c4874a;
  --warm-l:   #e0aa72;
  --warm-s:   #fdf0e2;
  --ink:      #1a2e22;
  --muted:    #5a7a65;
  --border:   rgba(58,125,92,0.18);
  --card:     rgba(244,247,242,0.96);
}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(58,125,92,0.25);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--green)}

@keyframes blobmove{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-18px) scale(1.05)}66%{transform:translate(-18px,20px) scale(.95)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes dot{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

.blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.28;pointer-events:none;animation:blobmove 13s ease-in-out infinite}

.card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 3px 18px rgba(58,125,92,.07)}
.hover-card{transition:transform .2s,box-shadow .2s;cursor:pointer}
.hover-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(58,125,92,.13)}

.nav{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:13.5px;color:var(--muted);transition:all .15s;border:1px solid transparent;user-select:none}
.nav:hover{background:rgba(58,125,92,.07);color:var(--ink)}
.nav.on{background:rgba(58,125,92,.13);color:var(--green);font-weight:600;border-color:var(--border)}

.inp{width:100%;background:rgba(244,247,242,.85);border:1px solid var(--border);border-radius:12px;padding:9px 13px;font-family:'Outfit',sans-serif;font-size:13.5px;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(58,125,92,.1)}
.inp::placeholder{color:var(--muted)}

.btn-d{background:var(--ink);color:#c8e6d4;border:none;border-radius:11px;padding:9px 18px;font-family:'Outfit',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px}
.btn-d:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,46,34,.22)}
.btn-d:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-g{background:linear-gradient(135deg,var(--green),var(--green-l));color:#f4f7f2;border:none;border-radius:11px;padding:9px 18px;font-family:'Outfit',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(58,125,92,.35)}
.btn-o{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:11px;padding:9px 18px;font-family:'Outfit',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px}
.btn-o:hover{background:var(--green-s);color:var(--ink);border-color:var(--green)}

.msg-u{background:var(--ink);color:#c8e6d4;border-radius:18px 4px 18px 18px;padding:11px 16px;font-size:14px;line-height:1.55;max-width:78%;animation:msgIn .25s ease both;align-self:flex-end}
.msg-a{background:var(--card);border:1px solid var(--border);border-radius:4px 18px 18px 18px;padding:11px 16px;font-size:14px;line-height:1.65;max-width:84%;animation:msgIn .25s ease both;align-self:flex-start;box-shadow:0 2px 10px rgba(58,125,92,.06)}

.dot-t{width:6px;height:6px;border-radius:99px;background:var(--green);animation:dot 1.2s ease infinite;display:inline-block}

.code-b{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:12.5px;overflow-x:auto;line-height:1.6;white-space:pre-wrap;word-break:break-all}

.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.3px}
.pill-g{background:var(--green-s);color:var(--green);border:1px solid rgba(58,125,92,.25)}
.pill-s{background:var(--sage-s);color:var(--sage);border:1px solid rgba(122,158,138,.25)}
.pill-w{background:var(--warm-s);color:var(--warm);border:1px solid rgba(196,135,74,.25)}
.pill-m{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}

.fade-up{animation:fadeUp .4s ease both}

/* dark mode */
.dark{background:#141f17!important;color:#e8f0ea!important}
.dark .card{background:rgba(22,34,26,.97)!important;border-color:rgba(58,125,92,.14)!important}
.dark .nav{color:#7aaa88!important}
.dark .nav.on{color:#5aa87a!important;background:rgba(58,125,92,.15)!important}
.dark .inp{background:rgba(30,46,35,.8)!important;color:#e8f0ea!important;border-color:rgba(58,125,92,.2)!important}
.dark .msg-a{background:rgba(28,42,32,.97)!important}
.dark .code-b{background:rgba(28,42,32,.9)!important}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .28s ease;position:fixed!important;z-index:100!important;height:100vh!important}
  .sidebar.open{transform:translateX(0)!important}
  .no-mob{display:none!important}
  .main{margin-left:0!important}
  .mob-bar{display:flex!important}
}
</style>
</head>

/* ── BRAND ── */
const B = { name:"My AI", tag:"Personal AI Operating System" };

/* ── AI MODES ── */
const MODES = {
  general:  {e:"💬",l:"General",  sys:"You are a helpful warm personal AI. Be concise and thoughtful. Use markdown."},
  coding:   {e:"💻",l:"Coding",   sys:"You are an expert software engineer. Write clean production-ready code with comments. Use markdown code blocks."},

};

/* ── AI CALL ── */
async function askAI(msgs, mode, onDone) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system: MODES[mode]?.sys || MODES.general.sys,
        messages: msgs.filter(m=>m.role!=="system").map(m=>({role:m.role,content:m.content}))
      })
    });
    const d = await res.json();
    const t = d.content?.map(b=>b.text||"").join("") || "Check your API key in Settings.";
    onDone(t);
  } catch {
    onDone("⚠️ Cannot reach AI. Add your API key in Settings → API Keys.");
  }
}

/* ── MARKDOWN ── */
function md(t) {
  if(!t) return "";
  return t
    .replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre class="code-b">${c.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</pre>`)
    .replace(/`([^`]+)`/g,`<code style="background:var(--bg3);border-radius:4px;padding:2px 6px;font-family:'JetBrains Mono',monospace;font-size:.875em">$1</code>`)
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/^### (.+)$/gm,`<h3 style="font-family:'Cormorant Garamond',serif;font-size:17px;margin:10px 0 5px;color:var(--ink)">$1</h3>`)
    .replace(/^## (.+)$/gm,`<h2 style="font-family:'Cormorant Garamond',serif;font-size:20px;margin:12px 0 6px;color:var(--ink)">$1</h2>`)
    .replace(/^- (.+)$/gm,`<div style="display:flex;gap:6px;margin:3px 0"><span style="color:var(--green)">•</span><span>$1</span></div>`)
    .replace(/\n\n/g,"<br/><br/>").replace(/\n/g,"<br/>");
}

/* ── CHAT ── */
function Chat({convs, setConvs}) {
  const [activeId, setActiveId] = useState(convs[0]?.id||null);
  const [input, setInput] = useState("");
  const [mode, setMode] = useState("general");
  const [loading, setLoading] = useState(false);
  const [copied, setCopied] = useState(null);
  const botRef = useRef(null);
  const inpRef = useRef(null);

  const conv = convs.find(c=>c.id===activeId);
  const msgs = conv?.msgs||[];

  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,loading]);

  function newChat() {
    const id = Date.now()+"";
    setConvs(p=>[{id,title:"New conversation",mode,msgs:[]}, ...p]);
    setActiveId(id);
  }

  async function send() {
    if(!input.trim()||loading) return;
    const txt = input.trim(); setInput(""); setLoading(true);
    const um = {role:"user",content:txt};
    setConvs(p=>p.map(c=>c.id===activeId?{...c,title:c.msgs.length===0?txt.slice(0,42):c.title,msgs:[...c.msgs,um]}:c));
    await askAI([...msgs,um], mode, reply=>{
      const am = {role:"assistant",content:reply};
      setConvs(p=>p.map(c=>c.id===activeId?{...c,msgs:[...c.msgs,am]}:c));
    });
    setLoading(false); inpRef.current?.focus();
  }

  function cp(txt,i){ navigator.clipboard?.writeText(txt); setCopied(i); setTimeout(()=>setCopied(null),1500); }

  return (
    <div style={{display:"flex",height:"100%"}}>
      {/* Sidebar list */}
      <div className="no-mob" style={{width:210,borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"14px 12px 8px"}}>
          <button className="btn-d" onClick={newChat} style={{width:"100%",justifyContent:"center",fontSize:13}}>
            <Ic n="plus" s={13}/> New Chat
          </button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 8px 10px"}}>
          {convs.map(c=>(
            <div key={c.id} onClick={()=>setActiveId(c.id)} style={{padding:"9px 10px",borderRadius:10,cursor:"pointer",marginBottom:3,background:c.id===activeId?"rgba(58,125,92,.12)":"transparent",border:`1px solid ${c.id===activeId?"var(--border)":"transparent"}`,transition:"all .15s"}}>
              <div style={{fontSize:12.5,fontWeight:c.id===activeId?600:400,color:c.id===activeId?"var(--green)":"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.title}</div>
              <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>{MODES[c.mode]?.e} {MODES[c.mode]?.l} · {c.msgs.length} msgs</div>
            </div>
          ))}
        </div>
      </div>

      {/* Main chat */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        {/* Mode bar */}
        <div style={{padding:"10px 18px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",flexShrink:0}}>
          <span style={{fontSize:13,color:"var(--muted)",marginRight:4,flexShrink:0}}>Mode:</span>
          {Object.entries(MODES).map(([k,v])=>(
            <button key={k} onClick={()=>setMode(k)} style={{background:mode===k?"var(--ink)":"transparent",color:mode===k?"#c8e6d4":"var(--muted)",border:`1px solid ${mode===k?"var(--ink)":"var(--border)"}`,borderRadius:8,padding:"4px 9px",fontSize:11,fontWeight:500,cursor:"pointer",transition:"all .15s"}}>
              {v.e} {v.l}
            </button>
          ))}
        </div>

        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"20px 22px",display:"flex",flexDirection:"column",gap:14}}>
          {msgs.length===0&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:10,opacity:.55}}>
              <span style={{fontSize:44}}>{MODES[mode]?.e}</span>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:"var(--ink)"}}>Start a {MODES[mode]?.l} chat</div>
              <div style={{fontSize:13,color:"var(--muted)",textAlign:"center",maxWidth:300}}>
                {mode==="coding"&&"Ask me to write, debug, or explain code"}
                {mode==="research"&&"Give me any topic to research in depth"}
                {mode==="study"&&"Tell me what subject you're studying"}
                {mode==="project"&&"Describe your project and goals"}
                {mode==="knowledge"&&"Ask about your uploaded documents"}
                {mode==="general"&&"Ask me anything at all"}
              </div>
            </div>
          )}
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",flexDirection:"column",gap:4,alignItems:m.role==="user"?"flex-end":"flex-start"}}>
              <div className={m.role==="user"?"msg-u":"msg-a"} dangerouslySetInnerHTML={m.role==="assistant"?{__html:md(m.content)}:undefined}>
                {m.role==="user"?m.content:undefined}
              </div>
              {m.role==="assistant"&&(
                <button onClick={()=>cp(m.content,i)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--muted)",display:"flex",alignItems:"center",gap:4,fontSize:11,padding:"2px 4px"}}>
                  <Ic n={copied===i?"chk":"copy"} s={11} c={copied===i?"var(--green)":"var(--muted)"}/> {copied===i?"Copied":"Copy"}
                </button>
              )}
            </div>
          ))}
          {loading&&(
            <div className="msg-a" style={{display:"flex",alignItems:"center",gap:5,padding:"12px 16px"}}>
              <span className="dot-t" style={{animationDelay:"0s"}}/>
              <span className="dot-t" style={{animationDelay:".2s"}}/>
              <span className="dot-t" style={{animationDelay:".4s"}}/>
            </div>
          )}
          <div ref={botRef}/>
        </div>

        {/* Input */}
        <div style={{padding:"12px 18px",borderTop:"1px solid var(--border)",flexShrink:0}}>
          <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
            <textarea ref={inpRef} className="inp" value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
              placeholder={`Ask ${B.name} (${MODES[mode]?.l} mode)…`} rows={1}
              style={{resize:"none",flex:1,minHeight:42,maxHeight:150,overflowY:"auto",borderRadius:14,lineHeight:1.5}}
              onInput={e=>{e.target.style.height="auto";e.target.style.height=e.target.scrollHeight+"px";}}/>
            <button className="btn-d" onClick={send} disabled={loading||!input.trim()} style={{padding:"10px 13px",borderRadius:12,flexShrink:0}}>
              {loading?<Spin/>:<Ic n="send" s={15}/>}
            </button>
          </div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:5,textAlign:"center"}}>Shift+Enter new line · Enter to send</div>
        </div>
      </div>
    </div>
  );
}

/* ── KNOWLEDGE ── */
function Know({files, setFiles}) {
  const [drag, setDrag] = useState(false);
  const ref = useRef(null);
  const fmt = b=>b>1e6?`${(b/1e6).toFixed(1)} MB`:`${(b/1e3).toFixed(0)} KB`;
  const fmtD = d=>new Date(d).toLocaleDateString("en",{month:"short",day:"numeric"});
  const ico = t=>t.includes("pdf")?"📄":t.includes("image")?"🖼️":t.includes("csv")?"📊":t.includes("word")?"📝":"📋";

  function add(fl){
    setFiles(p=>[...Array.from(fl).map(f=>({id:Date.now()+""+Math.random(),name:f.name,type:f.type,size:f.size,createdAt:new Date()})),...p]);
  }

  return (
    <div style={{padding:24,height:"100%",overflowY:"auto"}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:500,color:"var(--ink)"}}>Knowledge Base</h2>
        <p style={{fontSize:13,color:"var(--muted)"}}>Upload documents · AI searches them before answering</p>
      </div>

      <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);add(e.dataTransfer.files);}} onClick={()=>ref.current?.click()}
        style={{border:`2px dashed ${drag?"var(--green)":"var(--border)"}`,borderRadius:18,padding:36,textAlign:"center",cursor:"pointer",marginBottom:20,background:drag?"var(--green-s)":"transparent",transition:"all .2s"}}>
        <input ref={ref} type="file" multiple accept=".pdf,.txt,.md,.docx,.csv,.zip" style={{display:"none"}} onChange={e=>add(e.target.files)}/>
        <Ic n="up" s={28} c={drag?"var(--green)":"var(--muted)"} st={{margin:"0 auto 10px",display:"block"}}/>
        <div style={{fontSize:15,fontWeight:600,color:drag?"var(--green)":"var(--ink)",marginBottom:4}}>{drag?"Drop to upload":"Drop files or click to browse"}</div>
        <div style={{fontSize:12,color:"var(--muted)"}}>PDF · TXT · DOCX · CSV · MD · ZIP</div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {files.map((f,i)=>(
          <div key={f.id} className="card hover-card fade-up" style={{padding:"14px 18px",animationDelay:`${i*.04}s`}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <span style={{fontSize:26,flexShrink:0}}>{ico(f.type)}</span>
              <div style={{flex:1,overflow:"hidden"}}>
                <div style={{fontSize:14,fontWeight:600,color:"var(--ink)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{fmt(f.size)} · {fmtD(f.createdAt)}</div>
              </div>
              <div style={{display:"flex",gap:8,flexShrink:0}}>
                <span className="pill pill-g">Indexed</span>
                <button onClick={()=>setFiles(p=>p.filter(x=>x.id!==f.id))} style={{background:"none",border:"none",cursor:"pointer",color:"var(--muted)"}}>
                  <Ic n="del" s={14}/>
                </button>
              </div>
            </div>
          </div>
        ))}
        {files.length===0&&<div style={{textAlign:"center",color:"var(--muted)",padding:36,fontSize:13}}>No documents yet — upload your first one</div>}
      </div>
    </div>
  );
}

/* ── PROJECTS ── */
function Proj({projs, setProjs}) {
  const [pid, setPid] = useState(projs[0]?.id||null);
  const [nt, setNt] = useState(""); const [np, setNp] = useState(""); const [addP, setAddP] = useState(false);
  const p = projs.find(x=>x.id===pid);
  const done = p?.tasks.filter(t=>t.done).length||0;
  const tot = p?.tasks.length||0;
  const pct = tot?Math.round(done/tot*100):0;
  const sc = {ACTIVE:"pill-g",PAUSED:"pill-w",COMPLETED:"pill-s",ARCHIVED:"pill-m"};

  function addTask(){ if(!nt.trim()||!pid) return; setProjs(p2=>p2.map(x=>x.id===pid?{...x,tasks:[...x.tasks,{id:Date.now()+"",title:nt.trim(),done:false}]}:x)); setNt(""); }
  function tog(tid){ setProjs(p2=>p2.map(x=>x.id===pid?{...x,tasks:x.tasks.map(t=>t.id===tid?{...t,done:!t.done}:t)}:x)); }
  function addProj(){ if(!np.trim()) return; const id=Date.now()+""; setProjs(p2=>[...p2,{id,name:np.trim(),status:"ACTIVE",type:"general",tasks:[]}]); setPid(id); setNp(""); setAddP(false); }

  return (
    <div style={{display:"flex",height:"100%"}}>
      <div className="no-mob" style={{width:210,borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"14px 12px 8px"}}>
          <button className="btn-d" onClick={()=>setAddP(true)} style={{width:"100%",justifyContent:"center",fontSize:13}}><Ic n="plus" s={13}/> New Project</button>
        </div>
        {addP&&<div style={{padding:"0 12px 10px"}}>
          <input className="inp" style={{marginBottom:8,fontSize:13}} value={np} onChange={e=>setNp(e.target.value)} placeholder="Project name…" onKeyDown={e=>e.key==="Enter"&&addProj()} autoFocus/>
          <div style={{display:"flex",gap:6}}>
            <button className="btn-d" onClick={addProj} style={{flex:1,justifyContent:"center",fontSize:12,padding:"7px"}}>Add</button>
            <button className="btn-o" onClick={()=>setAddP(false)} style={{fontSize:12,padding:"7px 10px"}}>✕</button>
          </div>
        </div>}
        <div style={{flex:1,overflowY:"auto",padding:"0 8px 10px"}}>
          {projs.map(x=>(
            <div key={x.id} onClick={()=>setPid(x.id)} style={{padding:"10px",borderRadius:10,cursor:"pointer",marginBottom:4,background:x.id===pid?"rgba(58,125,92,.12)":"transparent",border:`1px solid ${x.id===pid?"var(--border)":"transparent"}`,transition:"all .15s"}}>
              <div style={{fontSize:13,fontWeight:x.id===pid?600:400,color:x.id===pid?"var(--green)":"var(--ink)",marginBottom:4}}>{x.name}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span className={`pill ${sc[x.status]||"pill-m"}`}>{x.status}</span>
                <span style={{fontSize:10.5,color:"var(--muted)"}}>{x.tasks.filter(t=>t.done).length}/{x.tasks.length}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{flex:1,padding:24,overflowY:"auto"}}>
        {p?(
          <>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
              <div>
                <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,color:"var(--ink)",marginBottom:4}}>{p.name}</h2>
                <span className={`pill ${sc[p.status]||"pill-m"}`}>{p.status}</span>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:24,fontWeight:700,color:"var(--ink)"}}>{pct}%</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>{done}/{tot} done</div>
              </div>
            </div>
            <div style={{background:"var(--bg3)",borderRadius:99,height:6,marginBottom:22,overflow:"hidden"}}>
              <div style={{background:"linear-gradient(90deg,var(--green),var(--green-l))",height:"100%",width:`${pct}%`,borderRadius:99,transition:"width .4s"}}/>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:18}}>
              <input className="inp" style={{flex:1}} value={nt} onChange={e=>setNt(e.target.value)} placeholder="Add a task…" onKeyDown={e=>e.key==="Enter"&&addTask()}/>
              <button className="btn-d" onClick={addTask}><Ic n="plus" s={14}/></button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {p.tasks.map(t=>(
                <div key={t.id} onClick={()=>tog(t.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:13,cursor:"pointer",transition:"all .15s"}}>
                  <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${t.done?"var(--green)":"var(--border)"}`,background:t.done?"var(--green-s)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                    {t.done&&<Ic n="chk" s={11} c="var(--green)"/>}
                  </div>
                  <span style={{fontSize:14,color:t.done?"var(--muted)":"var(--ink)",textDecoration:t.done?"line-through":"none"}}>{t.title}</span>
                </div>
              ))}
              {p.tasks.length===0&&<div style={{textAlign:"center",color:"var(--muted)",padding:28,fontSize:13}}>No tasks yet — add one above</div>}
            </div>
          </>
        ):(
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",flexDirection:"column",gap:10,opacity:.5}}>
            <Ic n="fold" s={36} c="var(--border)"/>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"var(--ink)"}}>Select or create a project</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── MEMORY ── */

              <label style={{fontSize:11,fontWeight:700,color:"var(--muted)",display:"block",marginBottom:4,letterSpacing:".5px"}}>TAGS</label>
              <input className="inp" value={form.tags} onChange={e=>setForm({...form,tags:e.target.value})} placeholder="coding, project…"/>
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:11,fontWeight:700,color:"var(--muted)",display:"block",marginBottom:4,letterSpacing:".5px"}}>TITLE</label>
            <input className="inp" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Memory title…"/>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:14}}>

/* ── NOTES ── */

              </div>

/* ── GENERATE FILES ── */
function Files() {
  const [type, setType] = useState("md");
  const [prompt, setPrompt] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const fmts = [{id:"md",l:"Markdown",e:"📝"},{id:"txt",l:"Plain Text",e:"📄"},{id:"csv",l:"CSV",e:"📊"},{id:"json",l:"JSON",e:"🔧"},{id:"html",l:"HTML",e:"🌐"},{id:"py",l:"Python",e:"🐍"}];

  async function gen(){
    if(!prompt.trim()) return; setLoading(true); setResult(null);
    await askAI([{role:"user",content:`Generate a ${type.toUpperCase()} file for: ${prompt}. Output ONLY the raw file content, nothing else.`}],"general",c=>{
      setResult({content:c,name:`generated-${Date.now()}.${type}`});
    });
    setLoading(false);
  }

  function dl(){ if(!result) return; const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([result.content],{type:"text/plain"})); a.download=result.name; a.click(); }

  return (
    <div style={{padding:24,height:"100%",overflowY:"auto"}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:500,color:"var(--ink)"}}>Generate Files</h2>
        <p style={{fontSize:13,color:"var(--muted)"}}>AI-generated downloadable files in any format</p>
      </div>
      <div className="card" style={{padding:24,marginBottom:18}}>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:11,fontWeight:700,color:"var(--muted)",display:"block",marginBottom:8,letterSpacing:".5px"}}>FORMAT</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {fmts.map(f=>(
              <button key={f.id} onClick={()=>setType(f.id)} style={{padding:"7px 14px",borderRadius:10,border:`1.5px solid ${type===f.id?"var(--green)":"var(--border)"}`,background:type===f.id?"var(--green-s)":"transparent",color:type===f.id?"var(--green)":"var(--muted)",cursor:"pointer",fontWeight:type===f.id?600:400,fontSize:13,transition:"all .15s"}}>
                {f.e} {f.l}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:11,fontWeight:700,color:"var(--muted)",display:"block",marginBottom:6,letterSpacing:".5px"}}>DESCRIBE THE FILE</label>
          <textarea className="inp" rows={3} value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder={`e.g. "README for a FastAPI project" or "CSV of world capitals"`} style={{resize:"vertical"}}/>
        </div>
        <button className="btn-d" onClick={gen} disabled={loading||!prompt.trim()}>
          {loading?<><Spin s={14}/> Generating…</>:<><Ic n="leaf" s={14}/> Generate {type.toUpperCase()}</>}
        </button>
      </div>
      {result&&(
        <div className="card fade-up" style={{padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:600,color:"var(--ink)",fontSize:14}}>📄 {result.name}</div>
            <button className="btn-d" onClick={dl} style={{fontSize:12,padding:"7px 14px"}}><Ic n="dl" s={13}/> Download</button>
          </div>
          <pre className="code-b" style={{maxHeight:360,overflowY:"auto",fontSize:12}}>{result.content}</pre>
        </div>
      )}
    </div>
  );
}
