<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Lumis — Personal AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{width:100%;height:100%;background:#f0f4f1}
body{font-family:'Outfit',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}

:root{
  --bg:#f0f4f1;--bg2:#e8ede9;--bg3:#dde6de;
  --g:#3a7d5c;--gl:#5aa87a;--gs:#dff0e8;
  --s:#7a9e8a;--sl:#a8c4b0;--ss:#eaf3ee;
  --w:#c4874a;--wl:#e0aa72;--ws:#fdf0e2;
  --ink:#1a2e22;--mu:#5a7a65;
  --bd:rgba(58,125,92,0.16);
  --card:rgba(240,244,241,0.97);
  --sh:0 2px 16px rgba(58,125,92,0.08);
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(58,125,92,0.2);border-radius:99px}

/* animations */
@keyframes blob{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-15px) scale(1.04)}66%{transform:translate(-15px,18px) scale(.96)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes modalUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}

.blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.25;pointer-events:none;animation:blob 14s ease-in-out infinite}
.fu{animation:fadeUp .4s ease both}

/* SIDEBAR */
.sb{
  position:fixed;left:0;top:0;bottom:0;width:260px;
  background:var(--card);border-right:1px solid var(--bd);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;flex-direction:column;z-index:200;
  transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.sb.open{transform:translateX(0)}
.overlay{position:fixed;inset:0;background:rgba(26,46,34,.5);z-index:199;animation:overlayIn .25s ease;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}

/* NAV ITEMS */
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;font-size:14px;color:var(--mu);transition:all .15s;border:1px solid transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.ni:hover,.ni:active{background:rgba(58,125,92,.08);color:var(--ink)}
.ni.on{background:rgba(58,125,92,.13);color:var(--g);font-weight:600;border-color:rgba(58,125,92,.2)}

/* BUTTONS */
.bd-btn{background:var(--ink);color:#c8e6d4;border:none;border-radius:12px;padding:10px 18px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px;touch-action:manipulation}
.bd-btn:active{transform:scale(.97)}
.bd-btn:disabled{opacity:.4;cursor:not-allowed}
.gg-btn{background:linear-gradient(135deg,var(--g),var(--gl));color:#f0f4f1;border:none;border-radius:12px;padding:10px 18px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px;touch-action:manipulation}
.gg-btn:active{transform:scale(.97)}
.gh-btn{background:transparent;color:var(--mu);border:1px solid var(--bd);border-radius:12px;padding:10px 18px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:7px;touch-action:manipulation}
.gh-btn:active{background:var(--gs);color:var(--ink)}

/* CARD */
.card{background:var(--card);border:1px solid var(--bd);border-radius:20px;box-shadow:var(--sh)}
.hc{transition:transform .2s,box-shadow .2s;cursor:pointer}
.hc:active{transform:scale(.98)}

/* INPUT */
.inp{width:100%;background:rgba(240,244,241,.85);border:1px solid var(--bd);border-radius:12px;padding:10px 14px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(58,125,92,.1)}
.inp::placeholder{color:var(--mu)}

/* MESSAGES */
.mu-msg{background:var(--ink);color:#c8e6d4;border-radius:18px 4px 18px 18px;padding:11px 15px;font-size:14px;line-height:1.55;max-width:80%;animation:msgIn .22s ease both;align-self:flex-end;word-break:break-word}
.ai-msg{background:var(--card);border:1px solid var(--bd);border-radius:4px 18px 18px 18px;padding:11px 15px;font-size:14px;line-height:1.65;max-width:86%;animation:msgIn .22s ease both;align-self:flex-start;box-shadow:var(--sh);word-break:break-word}

.dot{width:6px;height:6px;border-radius:99px;background:var(--g);display:inline-block;animation:blink 1.2s ease infinite}

.cb{background:var(--bg3);border:1px solid var(--bd);border-radius:11px;padding:13px 15px;font-family:'JetBrains Mono',monospace;font-size:12px;overflow-x:auto;line-height:1.6;white-space:pre-wrap;word-break:break-all}

/* PILL */
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.3px}
.pg{background:var(--gs);color:var(--g);border:1px solid rgba(58,125,92,.22)}
.ps{background:var(--ss);color:var(--s);border:1px solid rgba(122,158,138,.22)}
.pw{background:var(--ws);color:var(--w);border:1px solid rgba(196,135,74,.22)}
.pm{background:var(--bg3);color:var(--mu);border:1px solid var(--bd)}

/* LOCK SCREEN */
.lock{position:fixed;inset:0;background:linear-gradient(160deg,#1a2e22 0%,#0d1f14 100%);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:0}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(26,46,34,.6);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:overlayIn .2s ease;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:520px;padding:24px;animation:modalUp .25s ease;max-height:85vh;overflow-y:auto}

/* TOPBAR */
.topbar{display:flex;align-items:center;height:56px;padding:0 16px;background:var(--card);border-bottom:1px solid var(--bd);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;flex-shrink:0}

/* DARK */
.dark{--bg:#0f1a12;--bg2:#141f17;--bg3:#1a2a1d;--card:rgba(18,28,20,.97);--ink:#e8f0ea;--mu:#7aaa88;--bd:rgba(58,125,92,.15)}
.dark body{background:#0f1a12}

/* MODEL BADGE */
.mbadge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;background:var(--gs);color:var(--g);border:1px solid rgba(58,125,92,.2);cursor:pointer;transition:all .15s}
.mbadge:active{transform:scale(.96)}
</style>
</head>

/* ── CONFIG — passwords & default settings stored here ── */
// In production: store in /api/pass route or env vars
const DEFAULT_PASS = "lumis2024";
const SETTINGS_KEY = "lumis_settings";
const loadSettings = () => {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}"); } catch { return {}; }
};
const saveSettings = (s) => localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));

/* ── MARKDOWN ── */
function md(t){
  if(!t)return"";
  return t
    .replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre class="cb">${c.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</pre>`)
    .replace(/`([^`]+)`/g,`<code style="background:var(--bg3);border-radius:4px;padding:2px 6px;font-family:'JetBrains Mono',monospace;font-size:.85em">$1</code>`)
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/^### (.+)$/gm,`<h3 style="font-family:'Cormorant Garamond',serif;font-size:17px;margin:10px 0 5px;color:var(--ink)">$1</h3>`)
    .replace(/^## (.+)$/gm,`<h2 style="font-family:'Cormorant Garamond',serif;font-size:20px;margin:12px 0 6px;color:var(--ink)">$1</h2>`)
    .replace(/^- (.+)$/gm,`<div style="display:flex;gap:6px;margin:3px 0"><span style="color:var(--g)">•</span><span>$1</span></div>`)
    .replace(/\n\n/g,"<br/><br/>").replace(/\n/g,"<br/>");
}

const Spin = ({s=15}) => <div style={{width:s,height:s,border:"2px solid var(--gs)",borderTop:"2px solid var(--g)",borderRadius:"50%",animation:"spin .8s linear infinite",flexShrink:0}}/>;

/* ══════════════════════════════════════
   LOCK SCREEN
══════════════════════════════════════ */
function LockScreen({onUnlock}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [show,setShow]=useState(false);

  function tryUnlock(){
    const s=loadSettings();
    const correct = s.password || DEFAULT_PASS;
    if(pw===correct){ onUnlock(); }
    else{ setErr("Wrong password"); setPw(""); setTimeout(()=>setErr(""),2000); }
  }

  return(
    <div className="lock">
      <div style={{textAlign:"center",marginBottom:40,animation:"fadeUp .5s ease"}}>
        <div style={{width:70,height:70,borderRadius:22,background:"linear-gradient(135deg,rgba(58,125,92,.3),rgba(90,168,122,.2))",border:"1px solid rgba(58,125,92,.3)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px"}}>
          <I n="leaf" s={30} c="#5aa87a"/>
        </div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:38,fontWeight:300,color:"#e8f0ea",letterSpacing:"2px"}}>Lumis</div>
        <div style={{fontSize:12,color:"rgba(200,230,212,.45)",letterSpacing:"3px",marginTop:4}}>PERSONAL AI</div>
      </div>

      <div style={{width:"100%",maxWidth:320,padding:"0 24px",animation:"fadeUp .5s ease .1s both"}}>
        <div style={{position:"relative",marginBottom:12}}>
          <input
            className="inp"
            type={show?"text":"password"}
            value={pw}
            onChange={e=>{setPw(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&tryUnlock()}
            placeholder="Enter password"
            style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(58,125,92,.25)",color:"#e8f0ea",borderRadius:14,padding:"13px 46px 13px 16px",fontSize:15,textAlign:"center",letterSpacing:"3px"}}
            autoFocus
          />
          <button onClick={()=>setShow(!show)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"rgba(200,230,212,.5)",padding:4}}>
            <I n={show?"eyeoff":"eye"} s={16} c="rgba(200,230,212,.5)"/>
          </button>
        </div>

        {err && <div style={{color:"#f0a896",fontSize:13,textAlign:"center",marginBottom:10,animation:"fadeUp .2s ease"}}>{err}</div>}

        <button onClick={tryUnlock} className="gg-btn" style={{width:"100%",justifyContent:"center",fontSize:15,padding:"13px",borderRadius:14}}>
          <I n="leaf" s={15} c="#f0f4f1"/> Enter Lumis
        </button>

        <div style={{textAlign:"center",marginTop:16,fontSize:11,color:"rgba(200,230,212,.3)"}}>
          Change password in Settings after login
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   CHAT
══════════════════════════════════════ */
function Chat({convs,setConvs,cfg}){
  const [aid,setAid]=useState(convs[0]?.id||null);
  const [inp,setInp]=useState("");
  const [mode,setMode]=useState("general");
  const [loading,setLoading]=useState(false);
  const [copied,setCopied]=useState(null);
  const [showModel,setShowModel]=useState(false);
  const [localCfg,setLocalCfg]=useState(cfg);
  const botRef=useRef(null);
  const inpRef=useRef(null);

  const conv=convs.find(c=>c.id===aid);
  const msgs=conv?.msgs||[];

  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,loading]);
  useEffect(()=>{ setLocalCfg(cfg); },[cfg]);

  function newChat(){
    const id=Date.now()+"";
    setConvs(p=>[{id,title:"New conversation",mode,msgs:[]},...p]);
    setAid(id);
  }

  async function send(){
    if(!inp.trim()||loading)return;
    const txt=inp.trim(); setInp(""); setLoading(true);
    const um={role:"user",content:txt};
    setConvs(p=>p.map(c=>c.id===aid?{...c,title:c.msgs.length===0?txt.slice(0,42):c.title,msgs:[...c.msgs,um]}:c));

    const prov=PROVIDERS[localCfg.provider||"anthropic"];
    const key=loadSettings()[`key_${localCfg.provider||"anthropic"}`]||"";
    const sys=MODES[mode]?.sys||MODES.general.sys;

    try{
      const reply=await prov.call([...msgs,um],sys,localCfg.model||prov.models[0].id,key);
      setConvs(p=>p.map(c=>c.id===aid?{...c,msgs:[...c.msgs,{role:"assistant",content:reply}]}:c));
    }catch(e){
      setConvs(p=>p.map(c=>c.id===aid?{...c,msgs:[...c.msgs,{role:"assistant",content:`⚠️ **Error:** ${e.message}\n\nAdd your API key in **Settings → API Keys**.`}]}:c));
    }
    setLoading(false);
    setTimeout(()=>inpRef.current?.focus(),100);
  }

  function cp(t,i){ navigator.clipboard?.writeText(t); setCopied(i); setTimeout(()=>setCopied(null),1500); }

  const pInfo=PROVIDERS[localCfg.provider||"anthropic"];
  const mInfo=pInfo?.models.find(x=>x.id===localCfg.model)||pInfo?.models[0];

  return(
    <div style={{display:"flex",height:"100%",flexDirection:"column"}}>
      {/* Mode + Model bar */}
      <div style={{padding:"10px 14px",borderBottom:"1px solid var(--bd)",flexShrink:0}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:12,color:"var(--mu)",marginRight:2}}>Mode:</span>
          {Object.entries(MODES).map(([k,v])=>(
            <button key={k} onClick={()=>setMode(k)}
              style={{background:mode===k?"var(--ink)":"transparent",color:mode===k?"#c8e6d4":"var(--mu)",border:`1px solid ${mode===k?"var(--ink)":"var(--bd)"}`,borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:500,cursor:"pointer",transition:"all .15s",touchAction:"manipulation"}}>
              {v.e} {v.l}
            </button>
          ))}
          <button className="mbadge" onClick={()=>setShowModel(true)} style={{marginLeft:"auto"}}>
            <span>{pInfo?.icon}</span>
            <span>{mInfo?.label.split(" —")[0]||"Select Model"}</span>
            <I n="cpu" s={10} c="var(--g)"/>
          </button>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"18px 16px",display:"flex",flexDirection:"column",gap:14,WebkitOverflowScrolling:"touch"}}>
        {msgs.length===0&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:10,opacity:.5}}>
            <span style={{fontSize:44}}>{MODES[mode]?.e}</span>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:"var(--ink)",textAlign:"center"}}>{MODES[mode]?.l} mode</div>
            <div style={{fontSize:13,color:"var(--mu)",textAlign:"center",maxWidth:260}}>
              {mode==="coding"&&"Write, debug, or explain code"}
              {mode==="research"&&"Deep research on any topic"}
              {mode==="study"&&"Learn anything step by step"}
              {mode==="project"&&"Plan and organize your work"}
              {mode==="general"&&"Ask me absolutely anything"}
            </div>
          </div>
        )}
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",flexDirection:"column",gap:4,alignItems:m.role==="user"?"flex-end":"flex-start"}}>
            <div className={m.role==="user"?"mu-msg":"ai-msg"} dangerouslySetInnerHTML={m.role==="assistant"?{__html:md(m.content)}:undefined}>
              {m.role==="user"?m.content:undefined}
            </div>
            {m.role==="assistant"&&(
              <button onClick={()=>cp(m.content,i)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--mu)",display:"flex",alignItems:"center",gap:4,fontSize:11,padding:"2px 4px"}}>
                <I n={copied===i?"check":"copy"} s={11} c={copied===i?"var(--g)":"var(--mu)"}/>{copied===i?"Copied":"Copy"}
              </button>
            )}
          </div>
        ))}
        {loading&&(
          <div className="ai-msg" style={{display:"flex",alignItems:"center",gap:5,padding:"12px 15px"}}>
            <span className="dot" style={{animationDelay:"0s"}}/>
            <span className="dot" style={{animationDelay:".2s"}}/>
            <span className="dot" style={{animationDelay:".4s"}}/>
          </div>
        )}
        <div ref={botRef}/>
      </div>

      {/* Input */}
      <div style={{padding:"12px 14px",borderTop:"1px solid var(--bd)",flexShrink:0,background:"var(--card)"}}>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <textarea ref={inpRef} className="inp" value={inp}
            onChange={e=>setInp(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Message Lumis…" rows={1}
            style={{resize:"none",flex:1,minHeight:44,maxHeight:130,overflowY:"auto",borderRadius:14,lineHeight:1.5,fontSize:14,WebkitAppearance:"none"}}
            onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,130)+"px";}}/>
          <button className="bd-btn" onClick={send} disabled={loading||!inp.trim()} style={{padding:"11px 13px",borderRadius:13,flexShrink:0,minWidth:44,justifyContent:"center"}}>
            {loading?<Spin/>:<I n="send" s={15}/>}
          </button>
        </div>
        <div style={{fontSize:11,color:"var(--mu)",marginTop:5,textAlign:"center"}}>
          Shift+Enter = new line
        </div>
      </div>

      {showModel&&<ModelModal cfg={localCfg} onSave={c=>{setLocalCfg(c);setShowModel(false);}} onClose={()=>setShowModel(false)}/>}
    </div>
  );
}

/* ══════════════════════════════════════
   KNOWLEDGE
══════════════════════════════════════ */
function Know({files,setFiles}){
  const [drag,setDrag]=useState(false);
  const ref=useRef(null);
  const fmt=b=>b>1e6?`${(b/1e6).toFixed(1)} MB`:`${(b/1e3).toFixed(0)} KB`;
  const fmtD=d=>new Date(d).toLocaleDateString("en",{month:"short",day:"numeric"});
  const ico=t=>t.includes("pdf")?"📄":t.includes("image")?"🖼️":t.includes("csv")?"📊":t.includes("word")?"📝":"📋";

  function add(fl){
    setFiles(p=>[...Array.from(fl).map(f=>({id:Date.now()+""+Math.random(),name:f.name,type:f.type,size:f.size,createdAt:new Date()})),...p]);
  }

  return(
    <div style={{padding:20,height:"100%",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      <div style={{marginBottom:18}}>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:500,color:"var(--ink)"}}>Knowledge Base</h2>
        <p style={{fontSize:13,color:"var(--mu)"}}>Upload docs · AI searches before answering</p>
      </div>

      <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);add(e.dataTransfer.files);}}
        onClick={()=>ref.current?.click()}
        style={{border:`2px dashed ${drag?"var(--g)":"var(--bd)"}`,borderRadius:18,padding:32,textAlign:"center",cursor:"pointer",marginBottom:18,background:drag?"var(--gs)":"transparent",transition:"all .2s",touchAction:"manipulation"}}>
        <input ref={ref} type="file" multiple accept=".pdf,.txt,.md,.docx,.csv,.zip" style={{display:"none"}} onChange={e=>add(e.target.files)}/>
        <I n="up" s={26} c={drag?"var(--g)":"var(--mu)"} st={{margin:"0 auto 10px",display:"block"}}/>
        <div style={{fontSize:15,fontWeight:600,color:drag?"var(--g)":"var(--ink)",marginBottom:4}}>{drag?"Drop!":"Tap to upload"}</div>
        <div style={{fontSize:12,color:"var(--mu)"}}>PDF · TXT · DOCX · CSV · MD</div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {files.map((f,i)=>(
          <div key={f.id} className="card fu" style={{padding:"14px 16px",animationDelay:`${i*.04}s`}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:24,flexShrink:0}}>{ico(f.type)}</span>
              <div style={{flex:1,overflow:"hidden"}}>
                <div style={{fontSize:14,fontWeight:600,color:"var(--ink)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                <div style={{fontSize:12,color:"var(--mu)",marginTop:2}}>{fmt(f.size)} · {fmtD(f.createdAt)}</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                <span className="pill pg">Indexed</span>
                <button onClick={()=>setFiles(p=>p.filter(x=>x.id!==f.id))} style={{background:"none",border:"none",cursor:"pointer",color:"var(--mu)",padding:4}}><I n="del" s={14}/></button>
              </div>
            </div>
          </div>
        ))}
        {files.length===0&&<div style={{textAlign:"center",color:"var(--mu)",padding:36,fontSize:13}}>No documents yet</div>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   PROJECTS
══════════════════════════════════════ */
function Proj({projs,setProjs}){
  const [pid,setPid]=useState(projs[0]?.id||null);
  const [nt,setNt]=useState(""); const [np,setNp]=useState(""); const [addP,setAddP]=useState(false);
  const p=projs.find(x=>x.id===pid);
  const done=p?.tasks.filter(t=>t.done).length||0;
  const tot=p?.tasks.length||0;
  const pct=tot?Math.round(done/tot*100):0;

  function addTask(){ if(!nt.trim()||!pid)return; setProjs(p2=>p2.map(x=>x.id===pid?{...x,tasks:[...x.tasks,{id:Date.now()+"",title:nt.trim(),done:false}]}:x)); setNt(""); }
  function tog(tid){ setProjs(p2=>p2.map(x=>x.id===pid?{...x,tasks:x.tasks.map(t=>t.id===tid?{...t,done:!t.done}:t)}:x)); }
  function addProj(){ if(!np.trim())return; const id=Date.now()+""; setProjs(p2=>[...p2,{id,name:np.trim(),status:"ACTIVE",tasks:[]}]); setPid(id); setNp(""); setAddP(false); }
  const sc={ACTIVE:"pg",PAUSED:"pw",COMPLETED:"ps",ARCHIVED:"pm"};

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      {/* Project list - horizontal scroll on mobile */}
      <div style={{padding:"14px 16px 10px",borderBottom:"1px solid var(--bd)",flexShrink:0}}>
        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>
          {projs.map(x=>(
            <button key={x.id} onClick={()=>setPid(x.id)}
              style={{flexShrink:0,padding:"8px 14px",borderRadius:12,border:`1.5px solid ${x.id===pid?"var(--g)":"var(--bd)"}`,background:x.id===pid?"var(--gs)":"transparent",color:x.id===pid?"var(--g)":"var(--mu)",fontWeight:x.id===pid?600:400,fontSize:13,cursor:"pointer",transition:"all .15s",whiteSpace:"nowrap"}}>
              {x.name}
            </button>
          ))}
          <button onClick={()=>setAddP(true)} style={{flexShrink:0,padding:"8px 12px",borderRadius:12,border:"1.5px dashed var(--bd)",background:"transparent",color:"var(--mu)",cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:13}}>
            <I n="plus" s={13}/> New
          </button>
        </div>
        {addP&&(
          <div style={{marginTop:10,display:"flex",gap:8}}>
            <input className="inp" value={np} onChange={e=>setNp(e.target.value)} placeholder="Project name…" onKeyDown={e=>e.key==="Enter"&&addProj()} autoFocus style={{flex:1}}/>
            <button className="bd-btn" onClick={addProj} style={{padding:"9px 14px"}}>Add</button>
            <button className="gh-btn" onClick={()=>setAddP(false)} style={{padding:"9px 12px"}}>✕</button>
          </div>
        )}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:16,WebkitOverflowScrolling:"touch"}}>
        {p?(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,color:"var(--ink)",marginBottom:4}}>{p.name}</h2>
                <span className={`pill ${sc[p.status]||"pm"}`}>{p.status}</span>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:24,fontWeight:700,color:"var(--ink)"}}>{pct}%</div>
                <div style={{fontSize:11,color:"var(--mu)"}}>{done}/{tot}</div>
              </div>
            </div>
            <div style={{background:"var(--bg3)",borderRadius:99,height:6,marginBottom:18,overflow:"hidden"}}>
              <div style={{background:"linear-gradient(90deg,var(--g),var(--gl))",height:"100%",width:`${pct}%`,borderRadius:99,transition:"width .4s"}}/>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <input className="inp" style={{flex:1}} value={nt} onChange={e=>setNt(e.target.value)} placeholder="Add a task…" onKeyDown={e=>e.key==="Enter"&&addTask()}/>
              <button className="bd-btn" onClick={addTask} style={{padding:"9px 13px"}}><I n="plus" s={14}/></button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {p.tasks.map(t=>(
                <div key={t.id} onClick={()=>tog(t.id)}
                  style={{display:"flex",alignItems:"center",gap:12,padding:"13px 15px",background:"var(--card)",border:"1px solid var(--bd)",borderRadius:14,cursor:"pointer",transition:"all .15s",touchAction:"manipulation"}}>
                  <div style={{width:21,height:21,borderRadius:6,border:`2px solid ${t.done?"var(--g)":"var(--bd)"}`,background:t.done?"var(--gs)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                    {t.done&&<I n="check" s={11} c="var(--g)"/>}
                  </div>
                  <span style={{fontSize:14,color:t.done?"var(--mu)":"var(--ink)",textDecoration:t.done?"line-through":"none",flex:1}}>{t.title}</span>
                </div>
              ))}
              {p.tasks.length===0&&<div style={{textAlign:"center",color:"var(--mu)",padding:28,fontSize:13}}>No tasks yet</div>}
            </div>
          </>
        ):(
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"80%",flexDirection:"column",gap:10,opacity:.5}}>
            <I n="folder" s={36} c="var(--bd)"/>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"var(--ink)"}}>Select a project</div>
          </div>
        )}
      </div>
    </div>
  );
}

    if(!form.title.trim())return;
    setMems(p=>[{id:Date.now()+"",type:form.type,title:form.title,content:form.content,tags:form.tags.split(",").map(t=>t.trim()).filter(Boolean),importance:5},...p]);
    setForm({type:"NOTE",title:"",content:"",tags:""});
    setAdd(false);

  const list=mems.filter(m=>!srch||m.title.toLowerCase().includes(srch.toLowerCase())||m.content.toLowerCase().includes(srch.toLowerCase()));

            </div>
            <div style={{flex:1,overflow:"hidden"}}>

                <textarea value={n.content} onChange={e=>upd("content",e.target.value)} style={{width:"100%",height:"100%",padding:"18px 20px",fontFamily:"'Outfit',sans-serif",fontSize:14,color:"var(--ink)",background:"transparent",border:"none",outline:"none",resize:"none",lineHeight:1.7,WebkitAppearance:"none"}} placeholder="Write in markdown…"/>

/* ══════════════════════════════════════
   GENERATE FILES
══════════════════════════════════════ */
function Files({cfg}){
  const [type,setType]=useState("md");
  const [prompt,setPrompt]=useState("");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const fmts=[{id:"md",l:"Markdown",e:"📝"},{id:"txt",l:"Text",e:"📄"},{id:"csv",l:"CSV",e:"📊"},{id:"json",l:"JSON",e:"🔧"},{id:"html",l:"HTML",e:"🌐"},{id:"py",l:"Python",e:"🐍"}];

  async function gen(){
    if(!prompt.trim())return; setLoading(true); setResult(null);
    const prov=PROVIDERS[cfg.provider||"anthropic"];
    const key=loadSettings()[`key_${cfg.provider||"anthropic"}`]||"";
    try{
      const r=await prov.call([{role:"user",content:`Generate a ${type.toUpperCase()} file for: ${prompt}. Output ONLY raw file content, no explanation.`}],"You generate clean file content. Output raw content only.",cfg.model||prov.models[0].id,key);
      setResult({content:r,name:`lumis-${Date.now()}.${type}`});
    }catch(e){
      setResult({content:`Error: ${e.message}`,name:`error.txt`});
    }
    setLoading(false);
  }

  function dl(){ if(!result)return; const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([result.content],{type:"text/plain"})); a.download=result.name; a.click(); }

  return(
    <div style={{padding:20,height:"100%",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      <div style={{marginBottom:18}}>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:500,color:"var(--ink)"}}>Generate Files</h2>
        <p style={{fontSize:13,color:"var(--mu)"}}>AI-generated downloadable files</p>
      </div>

      <div className="card" style={{padding:20,marginBottom:16}}>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",marginBottom:8,letterSpacing:".5px"}}>FORMAT</label>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {fmts.map(f=>(
              <button key={f.id} onClick={()=>setType(f.id)} style={{padding:"7px 12px",borderRadius:10,border:`1.5px solid ${type===f.id?"var(--g)":"var(--bd)"}`,background:type===f.id?"var(--gs)":"transparent",color:type===f.id?"var(--g)":"var(--mu)",cursor:"pointer",fontWeight:type===f.id?600:400,fontSize:13,transition:"all .15s",touchAction:"manipulation"}}>
                {f.e} {f.l}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:"var(--mu)",display:"block",marginBottom:6,letterSpacing:".5px"}}>DESCRIBE</label>
          <textarea className="inp" rows={3} value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder={`e.g. "README for a FastAPI project with auth"`} style={{resize:"none"}}/>
        </div>
        <button className="bd-btn" onClick={gen} disabled={loading||!prompt.trim()} style={{width:"100%",justifyContent:"center",padding:"12px"}}>
          {loading?<><Spin s={14}/> Generating…</>:<><I n="spark" s={14}/> Generate {type.toUpperCase()}</>}
        </button>
      </div>

      {result&&(
        <div className="card fu" style={{padding:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:600,color:"var(--ink)",fontSize:14}}>📄 {result.name}</div>
            <button className="bd-btn" onClick={dl} style={{fontSize:12,padding:"7px 12px"}}><I n="dl" s={13}/> Download</button>
          </div>
          <pre className="cb" style={{maxHeight:300,overflowY:"auto",fontSize:12}}>{result.content}</pre>
        </div>
      )}
    </div>
  );
}

  ]);
  const [files,setFiles]=useState([
    {id:"1",name:"design-notes.md",type:"text/markdown",size:12400,createdAt:new Date(Date.now()-86400000*2)},
    {id:"2",name:"api-docs.pdf",type:"application/pdf",size:89000,createdAt:new Date(Date.now()-86400000*5)},
  ]);
  const [projs,setProjs]=useState([
    {id:"1",name:"SaaS Platform",status:"ACTIVE",tasks:[
      {id:"t1",title:"Design auth flow",done:true},
      {id:"t2",title:"Build API",done:false},
      {id:"t3",title:"Write tests",done:false},
    ]},
    {id:"2",name:"Telegram Bot",status:"ACTIVE",tasks:[
      {id:"t4",title:"Setup bot",done:true},
      {id:"t5",title:"Add AI",done:false},
    ]},
  ]);
  const [notes,setNotes]=useState([
    {id:"1",title:"Architecture",content:"Using Next.js App Router.\nPrisma for ORM.\nDeploy on Vercel.",tags:[],pinned:true},
    {id:"2",title:"Daily log",content:"- Fixed auth bug\n- File upload WIP\n- Next: search",tags:[],pinned:false},
  ]);

  const store={convs,setConvs,mems,setMems,files,setFiles,projs,setProjs,notes,setNotes};

  const nav=[
    {id:"home",i:"home",l:"Overview"},
    {id:"chat",i:"chat",l:"Chat"},
    {id:"know",i:"db",l:"Knowledge"},
    {id:"proj",i:"folder",l:"Projects"},
    {id:"mem",i:"brain",l:"Memory"},
    {id:"notep",i:"note",l:"Notes"},
    {id:"files",i:"dl",l:"Generate Files"},
    {id:"sett",i:"set",l:"Settings"},
  ];

  function goTo(v){ setView(v); setSbOpen(false); }

  function panel(){
    switch(view){
      case "home":  return <Overview store={store} setView={setView}/>;
      case "chat":  return <Chat convs={convs} setConvs={setConvs} cfg={aiCfg}/>;
      case "know":  return <Know files={files} setFiles={setFiles}/>;
      case "proj":  return <Proj projs={projs} setProjs={setProjs}/>;
      case "mem":   return <Mem mems={mems} setMems={setMems}/>;
      case "notep": return <Notes notes={notes} setNotes={setNotes}/>;
      case "files": return <Files cfg={aiCfg}/>;
      case "sett":  return <Settings dark={dark} setDark={setDark} onLock={()=>setLocked(true)}/>;
      default: return null;
    }
  }

  if(locked) return <LockScreen onUnlock={()=>setLocked(false)}/>;

  return(
    <div className={dark?"dark":""} style={{width:"100%",height:"100vh",display:"flex",flexDirection:"column",background:"var(--bg)",position:"relative",overflow:"hidden",fontFamily:"'Outfit',sans-serif",color:"var(--ink)"}}>

      {/* Blobs */}
      <div className="blob" style={{width:450,height:450,background:"radial-gradient(circle,var(--gs),transparent 70%)",top:-130,right:-70}}/>
      <div className="blob" style={{width:380,height:380,background:"radial-gradient(circle,var(--ss),transparent 70%)",bottom:-100,left:-50,animationDuration:"10s",animationDirection:"reverse"}}/>
      <div className="blob" style={{width:280,height:280,background:"radial-gradient(circle,var(--ws),transparent 70%)",top:"38%",right:"10%",animationDuration:"16s",animationDelay:"-6s"}}/>

      {/* Sidebar overlay */}
      {sbOpen&&<div className="overlay" onClick={()=>setSbOpen(false)}/>}

      {/* Sidebar */}
      <aside className={`sb${sbOpen?" open":""}`}>
        <div style={{padding:"20px 16px 14px",borderBottom:"1px solid var(--bd)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:11,background:"linear-gradient(135deg,var(--gs),var(--ss))",border:"1px solid var(--bd)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <I n="leaf" s={18} c="var(--g)"/>
            </div>
            <div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:"var(--ink)",lineHeight:1.1}}>Lumis</div>
              <div style={{fontSize:9.5,color:"var(--mu)",letterSpacing:".7px"}}>PERSONAL AI</div>
            </div>
          </div>
          <button onClick={()=>setSbOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--mu)",padding:6,borderRadius:8,touchAction:"manipulation"}}>
            <I n="x" s={18}/>
          </button>
        </div>

        <div style={{padding:"10px 12px"}}>
          <button className="gg-btn" onClick={()=>goTo("chat")} style={{width:"100%",justifyContent:"center",padding:"10px",fontSize:14}}>
            <I n="plus" s={14} c="#f0f4f1"/> New Conversation
          </button>
        </div>

        <nav style={{flex:1,overflowY:"auto",padding:"4px 10px",WebkitOverflowScrolling:"touch"}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--mu)",letterSpacing:"1px",padding:"6px 8px 4px"}}>WORKSPACE</div>
          {nav.slice(0,6).map(x=>(
            <div key={x.id} className={`ni${view===x.id?" on":""}`} onClick={()=>goTo(x.id)} style={{touchAction:"manipulation"}}>
              <I n={x.i} s={15} c={view===x.id?"var(--g)":"var(--mu)"}/>{x.l}
            </div>
          ))}
          <div style={{fontSize:10,fontWeight:700,color:"var(--mu)",letterSpacing:"1px",padding:"12px 8px 4px"}}>SYSTEM</div>
          {nav.slice(6).map(x=>(
            <div key={x.id} className={`ni${view===x.id?" on":""}`} onClick={()=>goTo(x.id)} style={{touchAction:"manipulation"}}>
              <I n={x.i} s={15} c={view===x.id?"var(--g)":"var(--mu)"}/>{x.l}
            </div>
          ))}
        </nav>

        <div style={{padding:"12px 14px",borderTop:"1px solid var(--bd)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:32,height:32,borderRadius:99,background:"linear-gradient(135deg,var(--g),var(--w))",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:13,fontWeight:700}}>L</div>
            <div>
              <div style={{fontSize:12.5,fontWeight:600,color:"var(--ink)"}}>Owner</div>
              <div style={{fontSize:10.5,color:"var(--mu)"}}>All access</div>
            </div>
          </div>
          <div style={{display:"flex",gap:2}}>
            <button onClick={()=>setDark(!dark)} style={{background:"none",border:"none",cursor:"pointer",padding:6,borderRadius:8,color:"var(--mu)",touchAction:"manipulation"}}>
              <I n={dark?"sun":"moon"} s={15}/>
            </button>
            <button onClick={()=>setLocked(true)} style={{background:"none",border:"none",cursor:"pointer",padding:6,borderRadius:8,color:"var(--mu)",touchAction:"manipulation"}}>
              <I n="lock" s={15}/>
            </button>
          </div>
        </div>
      </aside>

      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",height:"100vh"}}>
        {/* Topbar */}
        <div className="topbar">
          <button onClick={()=>setSbOpen(true)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--ink)",padding:8,borderRadius:10,marginRight:4,touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>
            <I n="menu" s={22}/>
          </button>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:"var(--ink)",flex:1}}>
            {nav.find(x=>x.id===view)?.l||"Lumis"}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11,color:"var(--mu)"}}>Lumis</span>
            <div style={{width:8,height:8,borderRadius:99,background:"var(--g)"}}/>
          </div>
        </div>

        {/* Panel */}
        <div style={{flex:1,overflow:"hidden",position:"relative",zIndex:1}}>
          {panel()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
