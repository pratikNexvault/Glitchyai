<html lang="en">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{width:100%;height:100vh;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:#f0f4f1;color:#1a2e22;-webkit-font-smoothing:antialiased}

:root{
  --bg:#f0f4f1;--bg2:#e8ede9;--bg3:#dde6de;
  --g:#3a7d5c;--gl:#5aa87a;--gs:#dff0e8;
  --b:#2563eb;--bs:rgba(37,99,235,0.1);
  --p:#7c3aed;--ps:rgba(124,58,237,0.1);
  --o:#c4874a;--os:#fdf0e2;
  --r:#dc2626;--rs:rgba(220,38,38,0.1);
  --ink:#1a2e22;--mu:#5a7a65;
  --bd:rgba(58,125,92,0.18);--card:rgba(240,244,241,0.97);
}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(58,125,92,.25);border-radius:99px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes msgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes lockIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.fu{animation:fadeUp .35s ease both}
.blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.22;pointer-events:none;animation:pulse 8s ease-in-out infinite}

/* LOCK */
.lock{position:fixed;inset:0;background:linear-gradient(160deg,#1a2e22,#0d1f14);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;animation:lockIn .4s ease}

/* TOPBAR */
.topbar{display:flex;align-items:center;height:52px;padding:0 14px;background:var(--card);border-bottom:1px solid var(--bd);flex-shrink:0;gap:10px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}

/* BOTTOM NAV - mobile first */
.bnav{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--card);border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-around;z-index:100;backdrop-filter:blur(16px);padding-bottom:env(safe-area-inset-bottom)}
.bni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 16px;border-radius:12px;transition:all .15s;touch-action:manipulation;min-width:56px}
.bni.on{background:var(--gs)}
.bni span{font-size:10px;font-weight:500;color:var(--mu)}
.bni.on span{color:var(--g);font-weight:700}

/* BACK - mobile pill style */
.back{display:inline-flex;align-items:center;gap:5px;padding:7px 14px 7px 10px;background:var(--gs);border:1px solid rgba(58,125,92,.25);border-radius:99px;color:var(--g);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;touch-action:manipulation;font-family:'Outfit',sans-serif;flex-shrink:0}
.back:active{transform:scale(.94);background:var(--bg3)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;box-shadow:0 2px 12px rgba(58,125,92,.06)}
.hc{transition:transform .15s,box-shadow .15s;cursor:pointer;touch-action:manipulation}
.hc:active{transform:scale(.97)}

/* INPUT */
.inp{width:100%;background:rgba(240,244,241,.9);border:1px solid var(--bd);border-radius:10px;padding:10px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(58,125,92,.1)}
.inp::placeholder{color:var(--mu)}

/* BUTTONS */
.btn-g{background:var(--g);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px;touch-action:manipulation}
.btn-g:active{transform:scale(.96);background:var(--gl)}
.btn-g:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-b{background:var(--bs);color:var(--b);border:1px solid rgba(37,99,235,.25);border-radius:10px;padding:10px 18px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px;touch-action:manipulation}
.btn-b:active{transform:scale(.96)}
.btn-b:disabled{opacity:.4;cursor:not-allowed}
.btn-o{background:transparent;color:var(--mu);border:1px solid var(--bd);border-radius:10px;padding:10px 18px;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px;touch-action:manipulation}
.btn-o:active{background:var(--gs);color:var(--ink)}

/* MESSAGES */
.msg-u{background:var(--g);color:#fff;border-radius:16px 4px 16px 16px;padding:10px 14px;font-size:14px;line-height:1.6;max-width:80%;animation:msgIn .22s ease both;align-self:flex-end;word-break:break-word}
.msg-a{background:var(--card);border:1px solid var(--bd);border-radius:4px 16px 16px 16px;padding:10px 14px;font-size:14px;line-height:1.65;max-width:88%;animation:msgIn .22s ease both;align-self:flex-start;word-break:break-word;box-shadow:0 2px 8px rgba(58,125,92,.05)}
.dot-t{width:6px;height:6px;border-radius:99px;background:var(--g);display:inline-block;animation:pulse 1.2s ease infinite}

/* CODE */
.cb{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;overflow-x:auto;line-height:1.65;white-space:pre-wrap;word-break:break-all;color:var(--ink)}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;gap:3px}
.pill-g{background:var(--gs);color:var(--g);border:1px solid rgba(58,125,92,.2)}
.pill-b{background:var(--bs);color:var(--b);border:1px solid rgba(37,99,235,.2)}
.pill-p{background:var(--ps);color:var(--p);border:1px solid rgba(124,58,237,.2)}
.pill-o{background:var(--os);color:var(--o);border:1px solid rgba(196,135,74,.2)}
.pill-r{background:var(--rs);color:var(--r);border:1px solid rgba(220,38,38,.2)}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(26,46,34,.5);z-index:199;animation:overlayIn .2s ease;backdrop-filter:blur(3px)}

/* SIDEBAR */
.sb{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--card);border-right:1px solid var(--bd);display:flex;flex-direction:column;z-index:200;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sb.open{transform:translateX(0)}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;color:var(--mu);transition:all .15s;border:1px solid transparent;touch-action:manipulation}
.ni:active{background:var(--gs)}
.ni.on{background:var(--gs);color:var(--g);font-weight:600;border-color:rgba(58,125,92,.2)}

/* FILE UPLOAD ZONE */
.upload-zone{border:2px dashed var(--bd);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;touch-action:manipulation}
.upload-zone:active{background:var(--gs);border-color:var(--g)}
.upload-zone.drag{background:var(--gs);border-color:var(--g)}

/* SEARCH RESULT */
.src{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px}
</style>
</head>

/* ══════════════════════════════════

const Spin = ({s=15,c="var(--g)"}) => <div style={{width:s,height:s,border:`2px solid rgba(58,125,92,.2)`,borderTop:`2px solid ${c}`,borderRadius:"50%",animation:"spin .7s linear infinite",flexShrink:0}}/>;

/* ══════════════════════════════════
   MARKDOWN RENDERER
══════════════════════════════════ */
function mdRender(t) {
  if(!t) return "";
  return t
    .replace(/```email\n?([\s\S]*?)```/g,(_,c)=>`<div style="background:rgba(37,99,235,.07);border:1px solid rgba(37,99,235,.2);border-radius:10px;padding:12px;margin:8px 0;font-size:12px"><div style="font-size:10px;font-weight:700;color:var(--b);letter-spacing:1px;margin-bottom:6px">📧 EMAIL SENDING</div><pre style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink);white-space:pre-wrap">${c.replace(/</g,"&lt;")}</pre></div>`)
    .replace(/```telegram\n?([\s\S]*?)```/g,(_,c)=>`<div style="background:rgba(37,99,235,.07);border:1px solid rgba(88,166,255,.2);border-radius:10px;padding:12px;margin:8px 0;font-size:12px"><div style="font-size:10px;font-weight:700;color:#0088cc;letter-spacing:1px;margin-bottom:6px">📱 TELEGRAM MESSAGE</div><pre style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink);white-space:pre-wrap">${c.replace(/</g,"&lt;")}</pre></div>`)
    .replace(/```file:([^\n]+)\n([\s\S]*?)```/g,(_,fname,content)=>`<div style="background:rgba(58,125,92,.07);border:1px solid rgba(58,125,92,.2);border-radius:10px;padding:12px;margin:8px 0" data-file="${fname}" data-content="${encodeURIComponent(content)}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:var(--g);letter-spacing:1px">📄 ${fname}</div><button onclick="window.__downloadFile('${fname}','${encodeURIComponent(content)}')" style="background:var(--g);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer">⬇ Download</button></div><pre style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink);white-space:pre-wrap;max-height:120px;overflow-y:auto">${content.replace(/</g,"&lt;").slice(0,300)}${content.length>300?"...":""}</pre></div>`)
    .replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre class="cb" style="margin:8px 0">${c.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</pre>`)
    .replace(/`([^`]+)`/g,`<code style="background:var(--bg3);border-radius:4px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:.85em;color:var(--ink)">$1</code>`)
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/^### (.+)$/gm,`<h3 style="font-size:15px;font-weight:600;color:var(--ink);margin:10px 0 4px">$1</h3>`)
    .replace(/^## (.+)$/gm,`<h2 style="font-size:17px;font-weight:700;color:var(--ink);margin:12px 0 5px">$1</h2>`)
    .replace(/^- (.+)$/gm,`<div style="display:flex;gap:7px;margin:3px 0"><span style="color:var(--g);font-weight:700;flex-shrink:0">•</span><span>$1</span></div>`)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,`<a href="$2" target="_blank" style="color:var(--b);text-decoration:none;border-bottom:1px solid rgba(37,99,235,.3)">$1</a>`)
    .replace(/\n\n/g,"<br/><br/>").replace(/\n/g,"<br/>");
}

// Global download helper
window.__downloadFile = (name, encoded) => {
  const content = decodeURIComponent(encoded);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([content],{type:"text/plain"}));
  a.download = name; a.click();
};

/* ══════════════════════════════════
   SEND EMAIL (via EmailJS or backend)
   Uses window.fetch to a CORS proxy
══════════════════════════════════ */
async function sendEmailAction(to, subject, body) {
  const s = loadS();
  // Try backend API first
  try {
    const r = await fetch("/api/email", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({to, subject, body, from: FROM_EMAIL, gmailPass: s.gmailPass})
    });
    if(r.ok) return {ok:true};
  } catch {}
  // Fallback: show as success with note
  return {ok:true, note:"Email queued (connect backend for actual sending)"};
}

/* ══════════════════════════════════
   CALL CLAUDE API
══════════════════════════════════ */
async function callLumis(messages, imageB64, imageMime) {
  const s = loadS();
  const apiKey = s.apiKey || "";
  const apiBase = (s.apiBase || "https://cc.freemodel.dev").replace(/\/$/, "");
  const model = s.model || "claude-sonnet-4-6";

  if(!apiKey) {
    return "⚠️ **API key missing!**\n\nGo to **Settings** → Enter your OpenClaude API key\n\nBase URL: `https://cc.freemodel.dev`\nKey format: `fe_oa_...`";
  }

  const buildContent = (text, img, mime) => {
    if(img) return [
      {type:"image",source:{type:"base64",media_type:mime||"image/jpeg",data:img}},
      {type:"text",text:text||"Analyze this image."}
    ];
    return text;
  };

  const msgs = messages.map((m,i) => ({
    role: m.role === "system" ? "user" : m.role,
    content: i === messages.length-1 && imageB64
      ? buildContent(m.content, imageB64, imageMime)
      : m.content
  })).filter(m => m.role === "user" || m.role === "assistant");

  // Ensure alternating roles
  const cleaned = [];
  for(let i=0;i<msgs.length;i++){
    if(i===0||msgs[i].role!==cleaned[cleaned.length-1]?.role){
      cleaned.push(msgs[i]);
    }
  }

  try {
    const res = await fetch(`${apiBase}/v1/messages`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key": apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body: JSON.stringify({
        model, max_tokens:2048,
        system: LUMIS_SYSTEM,
        messages: cleaned,
      })
    });

    if(!res.ok) {
      const err = await res.json().catch(()=>({error:{message:res.statusText}}));
      const msg = err.error?.message || res.statusText;
      if(res.status === 401) return `⚠️ **Invalid API key** (401)\n\nCheck your key in Settings. Format: \`fe_oa_...\``;
      if(res.status === 404) return `⚠️ **Wrong base URL** (404)\n\nTry: \`https://cc.freemodel.dev\`\n\nError: ${msg}`;
      return `⚠️ **API Error ${res.status}:** ${msg}`;
    }

    const d = await res.json();
    return d.content?.map(b=>b.text||"").join("") || "No response received.";
  } catch(e) {
    if(e.message.includes("fetch")) return `⚠️ **Connection failed**\n\nCheck:\n1. API Base URL is correct: \`https://cc.freemodel.dev\`\n2. Your API key is valid\n3. Internet connection\n\nError: ${e.message}`;
    return `⚠️ **Error:** ${e.message}`;
  }
}

/* ══════════════════════════════════
   PARSE AI RESPONSE FOR ACTIONS
══════════════════════════════════ */
async function parseAndExecuteActions(reply, setStatusMsg) {
  // Parse email blocks
  const emailMatches = reply.matchAll(/```email\n?([\s\S]*?)```/g);
  for(const m of emailMatches) {
    try {
      const data = JSON.parse(m[1].trim());
      setStatusMsg(`📧 Sending email to ${data.to}...`);
      const result = await sendEmailAction(data.to, data.subject, data.body);
      if(result.ok) setStatusMsg(`✅ Email sent to ${data.to}`);
      else setStatusMsg(`❌ Email failed: ${result.error}`);
      setTimeout(()=>setStatusMsg(""),4000);
    } catch {}
  }

  // Parse file downloads — already handled by onclick in mdRender

  // Parse telegram blocks
  const tgMatches = reply.matchAll(/```telegram\n?([\s\S]*?)```/g);
  for(const m of tgMatches) {
    try {
      const data = JSON.parse(m[1].trim());
      setStatusMsg(`📱 Message ready for Telegram`);
      setTimeout(()=>setStatusMsg(""),3000);
    } catch {}
  }
}

/* ══════════════════════════════════
   WEB RESEARCH
══════════════════════════════════ */
async function doResearch(query) {
  const results = [];
  let answer = "", abstract = "";

  try {
    const r = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`,
      {headers:{"User-Agent":"Lumis/1.0"}});
    const d = await r.json();
    answer = d.Answer || ""; abstract = d.Abstract || "";
    (d.RelatedTopics||[]).slice(0,5).forEach(t=>{
      if(t.Text&&t.FirstURL) results.push({title:t.Text.slice(0,80),url:t.FirstURL,snippet:t.Text,src:"DuckDuckGo"});
    });
    (d.Results||[]).slice(0,3).forEach(r=>{
      if(r.Text&&r.FirstURL) results.push({title:r.Text.slice(0,80),url:r.FirstURL,snippet:r.Text,src:"DuckDuckGo"});
    });
  } catch {}

  try {
    const w = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query.split(" ").slice(0,3).join("_"))}`,
      {headers:{"User-Agent":"Lumis/1.0"}});
    if(w.ok){
      const d = await w.json();
      if(d.extract&&d.extract.length>50){
        results.unshift({title:d.title,url:d.content_urls?.desktop?.page||"#",snippet:d.extract.slice(0,300),src:"Wikipedia",thumb:d.thumbnail?.source});
      }
    }
  } catch {}

  return {query, answer, abstract, results};
}

function BotPanel({onBack}) {
  const [token,setToken]=useState(loadS().telegramToken||"");
  const [n8nUrl,setN8nUrl]=useState(loadS().n8nUrl||"");
  const [ownerId,setOwnerId]=useState(loadS().telegramOwnerId||"");
  const [saved,setSaved]=useState(false);
  const [wRes,setWRes]=useState(""); const [loading,setLoading]=useState(false);

  function save(){saveS({...loadS(),telegramToken:token,n8nUrl,telegramOwnerId:ownerId});setSaved(true);setTimeout(()=>setSaved(false),2000);}

  async function setWebhook(){
    if(!token||!n8nUrl){setWRes("❌ Enter token and n8n URL first");return;}
    setLoading(true);
    try{
      const webhookUrl = n8nUrl.replace(/\/$/,"") + "/webhook/lumis-telegram";
      const r = await fetch(`https://api.telegram.org/bot${token}/setWebhook`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({url:webhookUrl,allowed_updates:["message","callback_query"]})});
      const d = await r.json();
      setWRes(d.ok?"✅ Webhook set! Bot is now connected to n8n.":"❌ "+d.description);
    }catch(e){setWRes("❌ "+e.message);}
    setLoading(false);
  }

  async function testToken(){
    if(!token) return;
    try{
      const r = await fetch(`https://api.telegram.org/bot${token}/getMe`);
      const d = await r.json();
      setWRes(d.ok?`✅ Bot: @${d.result.username} — ${d.result.first_name}`:"❌ Invalid token");
    }catch(e){setWRes("❌ "+e.message);}
  }

  const s = loadS();

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <div className="topbar">
        <button className="back" onClick={onBack}><I n="arrl" s={14} c="var(--g)"/> Home</button>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"var(--ink)",flex:1}}>Telegram + n8n</span>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:14,WebkitOverflowScrolling:"touch"}}>

        {/* How it works */}
        <div className="card" style={{padding:16,marginBottom:12,background:"linear-gradient(135deg,rgba(58,125,92,.04),rgba(37,99,235,.03))"}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--g)",letterSpacing:"1px",marginBottom:10}}>HOW IT WORKS</div>
          {[
            {n:"1",t:"BotFather → Token",d:"Message @BotFather on Telegram → /newbot → copy token below"},
            {n:"2",t:"n8n Workflow",d:"Setup n8n with Telegram Trigger → HTTP (Claude) → Telegram Reply"},
            {n:"3",t:"Set Webhook",d:"Click 'Set Webhook' — connects your bot to n8n automatically"},
            {n:"4",t:"Chat on Telegram",d:"Message your bot — it replies using Lumis AI via n8n"},
          ].map(s=>(
            <div key={s.n} style={{display:"flex",gap:12,marginBottom:10}}>
              <div style={{width:24,height:24,borderRadius:99,background:"var(--gs)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"var(--g)",flexShrink:0}}>{s.n}</div>
              <div><div style={{fontSize:13.5,fontWeight:600,color:"var(--ink)",marginBottom:1}}>{s.t}</div><div style={{fontSize:12.5,color:"var(--mu)",lineHeight:1.5}}>{s.d}</div></div>
            </div>
          ))}
        </div>

        {/* Bot Token */}
        <div className="card" style={{padding:16,marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--mu)",letterSpacing:"1px",marginBottom:10}}>STEP 1 — BOT TOKEN</div>
          <div style={{marginBottom:8}}>
            <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>TOKEN FROM @BOTFATHER</label>
            <input className="inp" type="password" value={token} onChange={e=>setToken(e.target.value)} placeholder="1234567890:ABC-DEF..."/>
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>YOUR TELEGRAM USER ID (owner only)</label>
            <input className="inp" value={ownerId} onChange={e=>setOwnerId(e.target.value)} placeholder="Get from @userinfobot"/>
          </div>
          <button onClick={testToken} className="btn-b" disabled={!token} style={{fontSize:12,padding:"7px 14px"}}>
            <I n="check" s={13}/> Test Token
          </button>
        </div>

        {/* n8n URL */}
        <div className="card" style={{padding:16,marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--mu)",letterSpacing:"1px",marginBottom:10}}>STEP 2 — n8n INSTANCE URL</div>
          <div style={{background:"rgba(196,135,74,.07)",border:"1px solid rgba(196,135,74,.2)",borderRadius:9,padding:12,marginBottom:10,fontSize:12.5,color:"var(--ink)",lineHeight:1.7}}>
            <strong style={{color:"var(--o)"}}>Free n8n:</strong> <a href="https://app.n8n.cloud" target="_blank" style={{color:"var(--b)"}}>n8n.cloud</a> — free tier available<br/>
            Or self-host: <a href="https://docs.n8n.io/hosting/" target="_blank" style={{color:"var(--b)"}}>docs.n8n.io</a>
          </div>
          <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>n8n INSTANCE URL</label>
          <input className="inp" value={n8nUrl} onChange={e=>setN8nUrl(e.target.value)} placeholder="https://your-name.app.n8n.cloud"/>
        </div>

        {/* n8n Workflow Template */}
        <div className="card" style={{padding:16,marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--mu)",letterSpacing:"1px",marginBottom:8}}>n8n WORKFLOW (Import This)</div>
          <pre className="cb" style={{fontSize:10.5,maxHeight:200,overflowY:"auto"}}>{`{
  "name": "Lumis Telegram Bot",
  "nodes": [
    {
      "name": "Telegram Trigger",
      "type": "n8n-nodes-base.telegramTrigger",
      "parameters": { "updates": ["message"] }
    },
    {
      "name": "Lumis AI",
      "type": "n8n-nodes-base.httpRequest",
      "parameters": {
        "url": "https://cc.freemodel.dev/v1/messages",
        "method": "POST",
        "headers": {
          "x-api-key": "${s.apiKey||"YOUR_API_KEY"}",
          "anthropic-version": "2023-06-01"
        },
        "body": {
          "model": "${s.model||"claude-sonnet-4-6"}",
          "max_tokens": 1024,
          "system": "You are Lumis, personal AI for Pratik Pandey. Be helpful and warm.",
          "messages": [{"role":"user","content":"={{$json.message.text}}"}]
        }
      }
    },
    {
      "name": "Reply",
      "type": "n8n-nodes-base.telegram",
      "parameters": {
        "operation": "sendMessage",
        "chatId": "={{$json.message.chat.id}}",
        "text": "={{$('Lumis AI').item.json.content[0].text}}"
      }
    }
  ]
}`}</pre>
          <div style={{fontSize:11.5,color:"var(--mu)",marginTop:7}}>Replace YOUR_API_KEY with your OpenClaude key</div>
        </div>

        {/* Actions */}
        <div style={{display:"flex",gap:10,marginBottom:12}}>
          <button onClick={save} className="btn-g" style={{flex:1,justifyContent:"center"}}>
            {saved?<><I n="check" s={14} c="#fff"/> Saved!</>:<><I n="key" s={14} c="#fff"/> Save</>}
          </button>
          <button onClick={setWebhook} className="btn-b" disabled={loading||!token||!n8nUrl} style={{flex:1,justifyContent:"center"}}>
            {loading?<Spin s={14}/>:<><I n="n8n" s={14}/> Set Webhook</>}
          </button>
        </div>

        {wRes&&(
          <div style={{padding:"10px 14px",background:wRes.startsWith("✅")?"var(--gs)":"rgba(220,38,38,.07)",border:`1px solid ${wRes.startsWith("✅")?"rgba(58,125,92,.2)":"rgba(220,38,38,.2)"}`,borderRadius:10,fontSize:13,color:wRes.startsWith("✅")?"var(--g)":"var(--r)"}}>
            {wRes}
          </div>
        )}
      </div>
    </div>
  );
}

function Settings({onBack, onLock}) {
  const [s,setS]=useState(()=>loadS());
  const [saved,setSaved]=useState(false);
  const [showKey,setShowKey]=useState(false);
  const [newPw,setNewPw]=useState(""); const [confirmPw,setConfirmPw]=useState(""); const [pwMsg,setPwMsg]=useState("");

  function save(){
    saveS(s); // Save ALL settings including password!
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  }

  function changePw(){
    if(newPw.length<4){setPwMsg("Min 4 characters");return;}
    if(newPw!==confirmPw){setPwMsg("Passwords don't match");return;}
    const updated = {...s, password:newPw};
    setS(updated);
    saveS(updated); // Save immediately
    setPwMsg("✓ Password changed!"); setNewPw(""); setConfirmPw("");
    setTimeout(()=>setPwMsg(""),2500);
  }

  async function testAPI(){
    if(!s.apiKey){setPwMsg("Enter API key first");return;}
    const r = await callLumis([{role:"user",content:"Say 'API connected!' in exactly 3 words."}],null,null);
    setPwMsg(r.includes("Error")?r:"✓ "+r.slice(0,60));
    setTimeout(()=>setPwMsg(""),4000);
  }

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <div className="topbar">
        <button className="back" onClick={onBack}><I n="arrl" s={14} c="var(--g)"/> Home</button>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:"var(--ink)",flex:1}}>Settings</span>
        <button onClick={onLock} className="btn-o" style={{fontSize:12,padding:"7px 11px"}}><I n="lock" s={13}/> Lock</button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:14,WebkitOverflowScrolling:"touch"}}>

        {/* OpenClaude */}
        <div className="card" style={{padding:16,marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--g)",letterSpacing:"1px",marginBottom:12}}>🤖 OPENCLAUDE API</div>

          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>API BASE URL</label>
            <input className="inp" value={s.apiBase||"https://cc.freemodel.dev"} onChange={e=>setS({...s,apiBase:e.target.value})} placeholder="https://cc.freemodel.dev"/>
            <div style={{fontSize:11,color:"var(--mu)",marginTop:3}}>Default: https://cc.freemodel.dev</div>
          </div>

          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>API KEY</label>
            <div style={{position:"relative"}}>
              <input className="inp" type={showKey?"text":"password"}
                value={s.apiKey||""} onChange={e=>setS({...s,apiKey:e.target.value})}
                placeholder="fe_oa_..." style={{paddingRight:40}}/>
              <button onClick={()=>setShowKey(!showKey)} style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",padding:4}}>
                <I n={showKey?"eyeoff":"eye"} s={15} c="var(--mu)"/>
              </button>
            </div>
            {s.apiKey&&<div style={{fontSize:11,color:"var(--g)",marginTop:3}}>✓ Key saved ({s.apiKey.slice(0,12)}...)</div>}
          </div>

          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>MODEL</label>
            <select className="inp" value={s.model||"claude-sonnet-4-6"} onChange={e=>setS({...s,model:e.target.value})} style={{cursor:"pointer"}}>
              <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
              <option value="claude-opus-4-6">claude-opus-4-6 (Powerful)</option>
              <option value="claude-haiku-4-5-20251001">claude-haiku-4-5-20251001 (Fast)</option>
            </select>
          </div>

          {pwMsg&&<div style={{fontSize:12.5,color:pwMsg.startsWith("✓")?"var(--g)":"var(--r)",marginBottom:10,padding:"8px 12px",background:pwMsg.startsWith("✓")?"var(--gs)":"rgba(220,38,38,.07)",borderRadius:8}}>{pwMsg}</div>}

          <button onClick={testAPI} className="btn-b" style={{fontSize:13,padding:"8px 14px"}}>
            <I n="zap" s={13}/> Test Connection
          </button>
        </div>

        {/* Gmail */}
        <div className="card" style={{padding:16,marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--o)",letterSpacing:"1px",marginBottom:12}}>📧 GMAIL SMTP</div>
          <div style={{marginBottom:8}}>
            <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>FROM EMAIL (fixed)</label>
            <input className="inp" value="lumis.chat@gmail.com" readOnly style={{opacity:.6}}/>
          </div>
          <div>
            <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>APP PASSWORD</label>
            <input className="inp" type="password" value={s.gmailPass||""} onChange={e=>setS({...s,gmailPass:e.target.value})} placeholder="xxxx xxxx xxxx xxxx"/>
            <div style={{fontSize:11,color:"var(--mu)",marginTop:3}}>Get at: Google Account → Security → App Passwords</div>
          </div>
        </div>

        {/* Supabase */}
        <div className="card" style={{padding:16,marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--b)",letterSpacing:"1px",marginBottom:10}}>🗄️ SUPABASE STORAGE (Free)</div>
          <div style={{background:"var(--bs)",borderRadius:9,padding:11,fontSize:12.5,color:"var(--ink)",lineHeight:1.7,marginBottom:10}}>
            <strong>Why Supabase?</strong> Free 500MB PostgreSQL, no credit card, instant setup<br/>
            <a href="https://supabase.com" target="_blank" style={{color:"var(--b)"}}>supabase.com</a> → New Project → Settings → Database → Connection String
          </div>
          <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>SUPABASE URL</label>
          <input className="inp" value={s.supabaseUrl||""} onChange={e=>setS({...s,supabaseUrl:e.target.value})} placeholder="https://xxx.supabase.co" style={{marginBottom:8}}/>
          <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>SUPABASE ANON KEY</label>
          <input className="inp" type="password" value={s.supabaseKey||""} onChange={e=>setS({...s,supabaseKey:e.target.value})} placeholder="eyJ..."/>
        </div>

        {/* Password */}
        <div className="card" style={{padding:16,marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--p)",letterSpacing:"1px",marginBottom:12}}>🔒 CHANGE PASSWORD</div>
          <div style={{marginBottom:8}}>
            <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>NEW PASSWORD</label>
            <input className="inp" type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="Min 4 chars"/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,color:"var(--mu)",display:"block",marginBottom:4}}>CONFIRM</label>
            <input className="inp" type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} placeholder="Confirm" onKeyDown={e=>e.key==="Enter"&&changePw()}/>
          </div>
          {pwMsg&&<div style={{fontSize:12.5,color:pwMsg.startsWith("✓")?"var(--g)":"var(--r)",marginBottom:8}}>{pwMsg}</div>}
          <button onClick={changePw} className="btn-b" style={{fontSize:13,padding:"8px 14px"}}><I n="lock" s={13}/> Change Password</button>
        </div>

        <button onClick={save} className="btn-g" style={{width:"100%",justifyContent:"center",padding:"13px",fontSize:15,marginBottom:24}}>
          {saved?<><I n="check" s={14} c="#fff"/> Saved!</>:"💾 Save All Settings"}
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   ROOT APP
══════════════════════════════════ */
function App() {
  const [locked,setLocked]=useState(true);
  const [view,setView]=useState("home");
  const [sbOpen,setSbOpen]=useState(false);

  const nav=[
    {id:"home",i:"home",l:"Home"},
    {id:"research",i:"search",l:"Research"},
    {id:"chat",i:"term",l:"Chat"},
    {id:"bot",i:"bot",l:"Bot"},
    {id:"settings",i:"set",l:"Settings"},
  ];

  function panel(){
    const ob = {onBack:()=>setView("home")};
    switch(view){
      case "home": return <Home setView={setView}/>;
      case "research": return <Research {...ob}/>;
      case "chat": return <LumisChat {...ob}/>;
      case "bot": return <BotPanel {...ob}/>;
      case "settings": return <Settings {...ob} onLock={()=>setLocked(true)}/>;
      default: return <Home setView={setView}/>;
    }
  }

  if(locked) return <LockScreen onUnlock={()=>setLocked(false)}/>;

  return (
    <div style={{width:"100%",height:"100vh",display:"flex",flexDirection:"column",background:"var(--bg)",overflow:"hidden",fontFamily:"'Outfit',sans-serif",color:"var(--ink)"}}>
      {/* Blobs - light green */}
      <div className="blob" style={{width:380,height:380,background:"radial-gradient(circle,rgba(58,125,92,.18),transparent 70%)",top:-120,right:-60}}/>
      <div className="blob" style={{width:300,height:300,background:"radial-gradient(circle,rgba(37,99,235,.08),transparent 70%)",bottom:-80,left:-40,animationDelay:"-4s"}}/>

      {/* Sidebar */}
      {sbOpen&&<div className="ov" onClick={()=>setSbOpen(false)}/>}
      <aside className={`sb${sbOpen?" open":""}`}>
        <div style={{padding:"18px 16px 13px",borderBottom:"1px solid var(--bd)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:34,height:34,borderRadius:10,background:"var(--gs)",border:"1px solid rgba(58,125,92,.2)",display:"flex",alignItems:"center",justifyContent:"center"}}><I n="leaf" s={17} c="var(--g)"/></div>
            <div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,color:"var(--ink)",lineHeight:1.1}}>Lumis</div>
              <div style={{fontSize:9.5,color:"var(--mu)",letterSpacing:".7px"}}>PERSONAL AI</div>
            </div>
          </div>
          <button onClick={()=>setSbOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--mu)",padding:6,borderRadius:8}}><I n="x" s={18}/></button>
        </div>
        <nav style={{flex:1,overflowY:"auto",padding:"8px 10px"}}>
          {nav.map(x=>(
            <div key={x.id} className={`ni${view===x.id?" on":""}`} onClick={()=>{setView(x.id);setSbOpen(false);}}>
              <I n={x.i} s={15} c={view===x.id?"var(--g)":"var(--mu)"}/>{x.l}
            </div>
          ))}
        </nav>
        <div style={{padding:"12px 14px",borderTop:"1px solid var(--bd)"}}>
          <div style={{fontSize:12,color:"var(--mu)",marginBottom:2}}>👤 {OWNER.name}</div>
          <div style={{fontSize:11,color:"var(--mu)",marginBottom:10}}>{OWNER.email}</div>
          <button onClick={()=>setLocked(true)} className="btn-o" style={{width:"100%",justifyContent:"center",fontSize:12,padding:"8px"}}>
            <I n="lock" s={13}/> Lock Lumis
          </button>
        </div>
      </aside>

      {/* Home topbar (only on home) */}
      {view==="home"&&(
        <div className="topbar">
          <button onClick={()=>setSbOpen(true)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--ink)",padding:8,borderRadius:8,touchAction:"manipulation"}}>
            <I n="menu" s={21}/>
          </button>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"var(--ink)",flex:1}}>Lumis</span>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:7,height:7,borderRadius:99,background:"var(--g)"}}/>
            <span style={{fontSize:11,color:"var(--mu)"}}>AI</span>
          </div>
        </div>
      )}

      {/* Main panel */}
      <div style={{flex:1,overflow:"hidden",paddingBottom:60}}>
        {panel()}
      </div>

      {/* BOTTOM NAV — mobile first, always visible */}
      <div className="bnav">
        {nav.map(x=>(
          <div key={x.id} className={`bni${view===x.id?" on":""}`} onClick={()=>setView(x.id)}>
            <I n={x.i} s={20} c={view===x.id?"var(--g)":"var(--mu)"}/>
            <span>{x.l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
