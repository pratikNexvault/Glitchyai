<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{width:100%;height:100vh;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:#0d1117;color:#e6edf3;-webkit-font-smoothing:antialiased}

:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --green:#3fb950;--green-d:#238636;--green-s:rgba(63,185,80,0.1);
  --blue:#58a6ff;--blue-s:rgba(88,166,255,0.1);
  --purple:#bc8cff;--purple-s:rgba(188,140,255,0.1);
  --orange:#ffa657;--orange-s:rgba(255,166,87,0.1);
  --red:#f85149;--red-s:rgba(248,81,73,0.1);
  --muted:#8b949e;--border:#30363d;
  --card:#161b22;--card2:#21262d;
}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:#8b949e}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(63,185,80,.3)}50%{box-shadow:0 0 25px rgba(63,185,80,.6)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes lockIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes typewriter{from{opacity:0}to{opacity:1}}
@keyframes gradMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.fu{animation:fadeUp .35s ease both}
.si{animation:slideIn .28s cubic-bezier(.4,0,.2,1) both}

/* LOCK */
.lock{position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;animation:lockIn .4s ease}

/* TOPBAR */
.topbar{display:flex;align-items:center;height:52px;padding:0 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;position:sticky;top:0;z-index:50}

/* SIDEBAR */
.sb{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sb.open{transform:translateX(0)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;animation:overlayIn .2s ease;backdrop-filter:blur(2px)}

/* NAV */
.ni{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--muted);transition:all .15s;border:1px solid transparent;user-select:none;touch-action:manipulation;font-family:'Outfit',sans-serif}
.ni:active{background:var(--bg3)}
.ni.on{background:var(--green-s);color:var(--green);font-weight:600;border-color:rgba(63,185,80,.2)}

/* BACK BTN */
.back{display:inline-flex;align-items:center;gap:5px;padding:6px 12px 6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;color:var(--muted);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;touch-action:manipulation;font-family:'Outfit',sans-serif}
.back:active{background:#30363d;transform:scale(.96)}
.back:hover{color:var(--green);border-color:rgba(63,185,80,.3)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px}
.hc{transition:transform .15s,border-color .15s;cursor:pointer;touch-action:manipulation}
.hc:active{transform:scale(.97)}
.hc:hover{border-color:#8b949e}

/* INPUT */
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:#e6edf3;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(88,166,255,.1)}
.inp::placeholder{color:var(--muted)}

/* BUTTONS */
.btn-g{background:var(--green-d);color:#fff;border:1px solid rgba(63,185,80,.3);border-radius:8px;padding:9px 18px;font-family:'Outfit',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px;touch-action:manipulation}
.btn-g:active{transform:scale(.96)}
.btn-g:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-b{background:var(--blue-s);color:var(--blue);border:1px solid rgba(88,166,255,.25);border-radius:8px;padding:9px 18px;font-family:'Outfit',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px;touch-action:manipulation}
.btn-b:active{transform:scale(.96)}
.btn-b:disabled{opacity:.4;cursor:not-allowed}

.btn-o:active{background:var(--bg3);color:#e6edf3}

/* MESSAGES */
.msg-u{background:#1f3a2b;border:1px solid rgba(63,185,80,.2);border-radius:12px 3px 12px 12px;padding:10px 14px;font-size:14px;line-height:1.6;max-width:82%;animation:msgIn .22s ease both;align-self:flex-end;word-break:break-word;color:#e6edf3}
.msg-a{background:var(--bg3);border:1px solid var(--border);border-radius:3px 12px 12px 12px;padding:10px 14px;font-size:14px;line-height:1.6;max-width:88%;animation:msgIn .22s ease both;align-self:flex-start;word-break:break-word}
.dot-t{width:5px;height:5px;border-radius:99px;background:var(--green);display:inline-block;animation:pulse 1.2s ease infinite}

/* CODE BLOCK */
.cb{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;overflow-x:auto;line-height:1.65;white-space:pre-wrap;word-break:break-all;color:#e6edf3}

/* TERMINAL */
.terminal{background:#0d1117;border:1px solid #30363d;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:13px;overflow:hidden}
.term-bar{background:#161b22;padding:10px 14px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:8px}

.term-input{background:transparent;border:none;outline:none;color:var(--green);font-family:'JetBrains Mono',monospace;font-size:13px;flex:1;caret-color:var(--green)}
.term-cursor{display:inline-block;width:8px;height:14px;background:var(--green);animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:1px}

/* PILL */

.pill-g{background:var(--green-s);color:var(--green);border:1px solid rgba(63,185,80,.2)}
.pill-b{background:var(--blue-s);color:var(--blue);border:1px solid rgba(88,166,255,.2)}

  .mob-top{display:flex!important}

/* ════════════════════════════════════
   MARKDOWN RENDERER
════════════════════════════════════ */
function mdRender(t) {
  if(!t) return "";
  return t
    .replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre class="cb" style="margin:10px 0">${c.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</pre>`)
    .replace(/`([^`]+)`/g,`<code style="background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:.85em;color:#e6edf3">$1</code>`)
    .replace(/\*\*(.*?)\*\*/g,"<strong style='color:#e6edf3'>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/^### (.+)$/gm,`<h3 style="font-size:15px;font-weight:600;color:#e6edf3;margin:12px 0 5px">$1</h3>`)
    .replace(/^## (.+)$/gm,`<h2 style="font-size:17px;font-weight:700;color:#e6edf3;margin:14px 0 6px">$1</h2>`)
    .replace(/^# (.+)$/gm,`<h1 style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:#e6edf3;margin:14px 0 8px">$1</h1>`)
    .replace(/^- (.+)$/gm,`<div style="display:flex;gap:7px;margin:4px 0;line-height:1.5"><span style="color:var(--green);font-weight:700;flex-shrink:0">•</span><span>$1</span></div>`)
    .replace(/^(\d+)\. (.+)$/gm,`<div style="display:flex;gap:7px;margin:4px 0"><span style="color:var(--muted);font-size:12px;flex-shrink:0">$1.</span><span>$1</span></div>`)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,`<a href="$2" target="_blank" style="color:var(--blue);text-decoration:none;border-bottom:1px solid rgba(88,166,255,.3)">$1</a>`)
    .replace(/\n\n/g,"<br/><br/>").replace(/\n/g,"<br/>");
}

/* ════════════════════════════════════
   SECURE API CALLER — OpenClaude
════════════════════════════════════ */
async function callClaude(messages, systemPrompt, imageBase64, imageMime) {
  const settings = loadSettings();
  const apiKey = settings.apiKey;
  const apiBase = settings.apiBase || "https://cc.freemodel.dev";
  const model = settings.model || "claude-sonnet-4-6";

  if(!apiKey) return "⚠️ API key not set. Go to **Settings** → add your OpenClaude API key.";

  // Build content with optional image
  const buildContent = (text, img, mime) => {
    if(img) return [
      {type:"image",source:{type:"base64",media_type:mime||"image/jpeg",data:img}},
      {type:"text",text}
    ];
    return text;
  };

  const msgs = messages.map((m,i) => ({
    role: m.role,
    content: i === messages.length-1 && imageBase64
      ? buildContent(m.content, imageBase64, imageMime)
      : m.content
  }));

  try {
    const res = await fetch(`${apiBase}/v1/messages`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key": apiKey,
        "anthropic-version":"2023-06-01",
      },
      body: JSON.stringify({
        model,
        max_tokens: 2048,
        system: systemPrompt,
        messages: msgs,
      })
    });
    const d = await res.json();
    if(!res.ok) throw new Error(d.error?.message || `API error ${res.status}`);
    return d.content?.map(b=>b.text||"").join("") || "No response";
  } catch(e) {
    return `⚠️ **Error:** ${e.message}\n\nCheck your API key and base URL in Settings.`;
  }
}

/* ════════════════════════════════════
   WEB RESEARCH — No API needed
════════════════════════════════════ */
async function doWebResearch(query) {
  // DuckDuckGo Instant Answer API — completely free, no key
  const results = [];
  let abstract = "";
  let answer = "";

  try {
    const ddg = await fetch(
      `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`,
      {headers:{"User-Agent":"Lumis-Research/1.0"}}
    );
    const d = await ddg.json();
    answer = d.Answer || "";
    abstract = d.Abstract || "";
    if(d.RelatedTopics) {
      d.RelatedTopics.slice(0,6).forEach(t=>{
        if(t.Text && t.FirstURL) results.push({title:t.Text.slice(0,80),url:t.FirstURL,snippet:t.Text,source:"DuckDuckGo"});
      });
    }
    if(d.Results) {
      d.Results.slice(0,3).forEach(r=>{
        if(r.Text && r.FirstURL) results.push({title:r.Text.slice(0,80),url:r.FirstURL,snippet:r.Text,source:"DuckDuckGo"});
      });
    }
  } catch(e) {}

  // Wikipedia summary
  try {
    const wiki = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query.split(" ").slice(0,3).join("_"))}`,
      {headers:{"User-Agent":"Lumis-Research/1.0"}}
    );
    if(wiki.ok) {
      const w = await wiki.json();
      if(w.extract && w.extract.length > 50) {
        results.unshift({title:w.title,url:w.content_urls?.desktop?.page||"#",snippet:w.extract.slice(0,300),source:"Wikipedia",thumbnail:w.thumbnail?.source});
      }
    }
  } catch(e) {}

  return {query, answer, abstract, results};
}

  async function search() {
    if(!query.trim()) return;
    setLoading(true); setResult(null); setAiSummary("");
    const r = await doWebResearch(query);
    setResult(r);
    setLoading(false);

    // Auto AI summary if API key available
    const s = loadSettings();
    if(s.apiKey && r.results.length > 0) {
      setAiLoading(true);
      const ctx = r.results.map(x=>x.snippet).join("\n\n");

          <button className="btn-g" onClick={search} disabled={loading||!query.trim()} style={{padding:"9px 16px",flexShrink:0}}>

        {/* Sources badge */}
        {!result&&!loading&&(

function Terminal({onBack}) {
  const [messages,setMessages] = useState([]);
  const [input,setInput] = useState("");
  const [loading,setLoading] = useState(false);
  const [image,setImage] = useState(null); // {base64, mime, preview}
  const [copied,setCopied] = useState(null);
  const botRef = useRef(null);
  const inpRef = useRef(null);
  const fileRef = useRef(null);
  const sessionId = useRef(`s_${Date.now()}`);

  const SYS = `You are Lumis — an elite AI assistant and software engineer with 15+ years of experience.

EXPERTISE: Python, JavaScript, TypeScript, Java, C++, Go, Rust, React, Next.js, FastAPI, Django, Node.js, Flutter, PostgreSQL, MongoDB, Redis, Docker, AWS, Telegram bots, REST APIs, GraphQL, AI/ML.

CODING STYLE: Write production-ready, well-commented, clean code. Always use markdown code blocks. Explain your decisions. Suggest improvements.

PERSONALITY: Direct, expert, helpful. Never say "I can't." Always find a solution. Support Hindi/English mixed conversation.

If an image is provided, analyze it thoroughly and reference it in your response.`;

  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[messages,loading]);

  function handleFile(e) {
    const f = e.target.files?.[0]; if(!f) return;
    const mime = f.type || "image/jpeg";
    const reader = new FileReader();
    reader.onload = ev => {
      const base64 = ev.target.result.split(",")[1];
      setImage({base64, mime, preview:ev.target.result, name:f.name});
    };
    reader.readAsDataURL(f);
  }

  async function send() {
    if((!input.trim()&&!image)||loading) return;
    const txt = input.trim() || (image?"Analyze this image.":"");
    setInput("");
    const newMsg = {role:"user",content:txt,image:image?.preview,imageName:image?.name};
    const imgData = image ? {base64:image.base64,mime:image.mime} : null;
    setImage(null);

    setMessages(p=>[...p,newMsg]);
    setLoading(true);

    const apiMsgs = [...messages,{role:"user",content:txt}].map(m=>({role:m.role,content:m.content}));
    const reply = await callClaude(apiMsgs, SYS, imgData?.base64, imgData?.mime);

    setMessages(p=>[...p,{role:"assistant",content:reply}]);
    setLoading(false);
    setTimeout(()=>inpRef.current?.focus(),80);
  }

  function cp(t,i){navigator.clipboard?.writeText(t);setCopied(i);setTimeout(()=>setCopied(null),1500);}

  const settings = loadSettings();
  const connected = !!settings.apiKey;

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <div className="topbar">
        <button className="back" onClick={onBack}><I n="arrl" s={14} c="var(--muted)"/> Home</button>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:8,height:8,borderRadius:99,background:connected?"var(--green)":"var(--red)",flexShrink:0}}/>
          <span style={{fontFamily:"'JetBrains Mono',serif",fontSize:14,color:"#e6edf3"}}>Claude Terminal</span>
          {connected&&<span className="pill pill-g" style={{fontSize:10}}>{settings.model||"claude-sonnet-4-6"}</span>}
        </div>
        <button onClick={()=>setMessages([])} style={{background:"none",border:"none",cursor:"pointer",color:"var(--muted)",padding:6,borderRadius:6,touchAction:"manipulation"}}>
          <I n="trash" s={15}/>
        </button>
        <button onClick={()=>fileRef.current?.click()} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"6px 10px",cursor:"pointer",color:"var(--muted)",display:"flex",alignItems:"center",gap:5,fontSize:12,touchAction:"manipulation"}}>
          <I n="img" s={14}/> Image
        </button>
        <input ref={fileRef} type="file" accept="image/*,.pdf,.txt,.md,.csv,.js,.py,.ts,.json" style={{display:"none"}} onChange={handleFile}/>
      </div>

      {!connected&&(
        <div style={{background:"rgba(248,81,73,.08)",border:"1px solid rgba(248,81,73,.2)",borderRadius:0,padding:"10px 16px",fontSize:13,color:"var(--red)",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <I n="key" s={14}/> API key not set — go to <strong style={{marginLeft:3}}>Settings</strong> to connect OpenClaude
        </div>
      )}

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 14px",display:"flex",flexDirection:"column",gap:14,WebkitOverflowScrolling:"touch"}}>
        {messages.length===0&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:12,opacity:.5}}>
            <div className="terminal" style={{padding:16,width:"100%",maxWidth:300,textAlign:"left"}}>
              <div className="term-bar">
                <div className="term-dot" style={{background:"#ff5f57"}}/>
                <div className="term-dot" style={{background:"#febc2e"}}/>
                <div className="term-dot" style={{background:"#28c840"}}/>
                <span style={{fontSize:12,color:"var(--muted)",marginLeft:8}}>lumis — claude</span>
              </div>
              <div style={{padding:"12px 14px",fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"var(--green)"}}>
                {">"} Welcome to Lumis Terminal<br/>
                <span style={{color:"var(--muted)"}}>{">"} Powered by Claude via OpenClaude</span><br/>
                {">"} Ask me anything...<span className="term-cursor"/>
              </div>
            </div>
            <div style={{fontSize:13,color:"var(--muted)",textAlign:"center",maxWidth:260,lineHeight:1.6}}>
              15+ year expert coder · Upload images/files · Ask anything
            </div>
          </div>
        )}

        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",flexDirection:"column",gap:4,alignItems:m.role==="user"?"flex-end":"flex-start"}}>
            {m.image&&(
              <div style={{alignSelf:m.role==="user"?"flex-end":"flex-start",marginBottom:4}}>
                <img src={m.image} alt={m.imageName||"uploaded"} className="img-prev" style={{maxWidth:220}}/>
                {m.imageName&&<div style={{fontSize:11,color:"var(--muted)",marginTop:3,textAlign:"center"}}>{m.imageName}</div>}
              </div>
            )}
            <div className={m.role==="user"?"msg-u":"msg-a"}
              dangerouslySetInnerHTML={m.role==="assistant"?{__html:mdRender(m.content)}:undefined}>
              {m.role==="user"?m.content:undefined}
            </div>
            {m.role==="assistant"&&(
              <button onClick={()=>cp(m.content,i)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--muted)",display:"flex",alignItems:"center",gap:4,fontSize:11,padding:"2px 4px"}}>
                <I n={copied===i?"check":"copy"} s={11} c={copied===i?"var(--green)":"var(--muted)"}/>{copied===i?"Copied":"Copy"}
              </button>
            )}
          </div>
        ))}

        {loading&&(
          <div className="msg-a" style={{display:"flex",alignItems:"center",gap:6,padding:"12px 14px"}}>
            <span className="dot-t" style={{animationDelay:"0s"}}/>
            <span className="dot-t" style={{animationDelay:".2s"}}/>
            <span className="dot-t" style={{animationDelay:".4s"}}/>
          </div>
        )}
        <div ref={botRef}/>
      </div>

      {/* Image preview bar */}
      {image&&(
        <div style={{padding:"8px 14px",borderTop:"1px solid var(--border)",background:"var(--bg2)",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <img src={image.preview} style={{width:36,height:36,borderRadius:6,objectFit:"cover",border:"1px solid var(--border)"}}/>
          <div style={{flex:1,fontSize:12,color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{image.name}</div>
          <button onClick={()=>setImage(null)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--muted)",padding:4}}>
            <I n="x" s={16}/>
          </button>
        </div>
      )}

      {/* Input */}
      <div style={{padding:"10px 14px",borderTop:"1px solid var(--border)",flexShrink:0,background:"var(--bg2)"}}>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <textarea ref={inpRef} className="inp" value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Ask Claude anything… code, analysis, images…"
            rows={1}
            style={{resize:"none",flex:1,minHeight:44,maxHeight:120,overflowY:"auto",borderRadius:10,lineHeight:1.5,fontFamily:"'JetBrains Mono',monospace",fontSize:13}}
            onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}/>
          <button className="btn-g" onClick={send} disabled={loading||(!input.trim()&&!image)} style={{padding:"11px 13px",borderRadius:10,flexShrink:0,justifyContent:"center"}}>
            {loading?<Spin s={14} c="#fff"/>:<I n="send" s={15} c="#fff"/>}
          </button>
        </div>
        <div style={{fontSize:11,color:"var(--muted)",marginTop:5,textAlign:"center"}}>Shift+Enter = new line · Upload image/file for analysis</div>
      </div>
    </div>
  );
}

function BotPanel({onBack}) {
  const [token,setToken] = useState(loadSettings().telegramToken||"");
  const [n8nUrl,setN8nUrl] = useState(loadSettings().n8nUrl||"");
  const [ownerId,setOwnerId] = useState(loadSettings().telegramOwnerId||"");
  const [saved,setSaved] = useState(false);
  const [webhookRes,setWebhookRes] = useState("");
  const [loading,setLoading] = useState(false);

  function save() {
    const s = loadSettings();
    saveSettings({...s,telegramToken:token,n8nUrl,telegramOwnerId:ownerId});
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  }

  async function setWebhook() {
    if(!token||!n8nUrl) return;
    setLoading(true);
    try {
      const webhookUrl = n8nUrl.endsWith("/") ? n8nUrl + "webhook/lumis-bot" : n8nUrl + "/webhook/lumis-bot";
      const r = await fetch(`https://api.telegram.org/bot${token}/setWebhook`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:webhookUrl,allowed_updates:["message","callback_query"]})
      });
      const d = await r.json();
      setWebhookRes(d.ok ? "✅ Webhook set! Bot is live." : "❌ "+d.description);
    } catch(e) { setWebhookRes("❌ Error: "+e.message); }
    setLoading(false);
  }

  async function testBot() {
    if(!token) return;
    try {
      const r = await fetch(`https://api.telegram.org/bot${token}/getMe`);
      const d = await r.json();
      setWebhookRes(d.ok ? `✅ Bot: @${d.result.username} (${d.result.first_name})` : "❌ Invalid token");
    } catch(e) { setWebhookRes("❌ Network error"); }
  }

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <div className="topbar">
        <button className="back" onClick={onBack}><I n="arrl" s={14} c="var(--muted)"/> Home</button>

        {/* How it works */}
        <div className="card" style={{padding:18,marginBottom:14,background:"linear-gradient(135deg,rgba(63,185,80,.05),rgba(88,166,255,.04))"}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--green)",letterSpacing:"1px",marginBottom:10}}>HOW IT WORKS</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[
              {i:"bot",c:"var(--blue)",t:"Telegram Bot",d:"User sends message to your bot"},
              {i:"n8n",c:"var(--orange)",t:"n8n Webhook",d:"Telegram triggers n8n workflow"},
              {i:"zap",c:"var(--purple)",t:"n8n → OpenClaude",d:"n8n calls Claude API with message"},
              {i:"send",c:"var(--green)",t:"Reply Back",d:"n8n sends AI response to Telegram"},
            ].map(({i,c,t,d},idx)=>(
              <div key={idx} style={{display:"flex",gap:12,alignItems:"center"}}>
                <div style={{width:32,height:32,borderRadius:9,background:`${c}15`,border:`1px solid ${c}30`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <I n={i} s={14} c={c}/>
                </div>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:"#e6edf3"}}>{t}</div>
                  <div style={{fontSize:12,color:"var(--muted)"}}>{d}</div>
                </div>
                {idx<3&&<div style={{marginLeft:"auto",color:"var(--border)",fontSize:16}}>→</div>}
              </div>
            ))}
          </div>
        </div>

        {/* Step 1 - Bot Token */}
        <div className="card" style={{padding:18,marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",letterSpacing:"1px",marginBottom:10}}>STEP 1 — TELEGRAM BOT TOKEN</div>
          <div style={{marginBottom:10}}>

            <input className="inp" type="password" value={token} onChange={e=>setToken(e.target.value)} placeholder="1234567890:ABC-DEF..."/>
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--muted)",display:"block",marginBottom:5}}>YOUR TELEGRAM USER ID (owner only)</label>

        {/* Step 2 - n8n */}
        <div className="card" style={{padding:18,marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",letterSpacing:"1px",marginBottom:10}}>STEP 2 — n8n WEBHOOK URL</div>
          <div style={{background:"rgba(255,166,87,.07)",border:"1px solid rgba(255,166,87,.2)",borderRadius:10,padding:12,marginBottom:12,fontSize:12.5,color:"#c9d1d9",lineHeight:1.7}}>
            <strong style={{color:"var(--orange)"}}>n8n Setup:</strong><br/>
            1. Go to <a href="https://app.n8n.cloud" target="_blank" style={{color:"var(--blue)"}}>n8n.cloud</a> (free tier available)<br/>
            2. Create a new workflow<br/>
            3. Add <strong>Telegram Trigger</strong> node → connect your bot<br/>
            4. Add <strong>HTTP Request</strong> node → call OpenClaude API<br/>
            5. Add <strong>Telegram</strong> node → send reply<br/>
            6. Copy your n8n instance URL below
          </div>
          <label style={{fontSize:12,color:"var(--muted)",display:"block",marginBottom:5}}>n8n INSTANCE URL</label>
          <input className="inp" value={n8nUrl} onChange={e=>setN8nUrl(e.target.value)} placeholder="https://your-instance.n8n.cloud"/>
        </div>

        {/* n8n workflow template */}
        <div className="card" style={{padding:18,marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",letterSpacing:"1px",marginBottom:10}}>n8n WORKFLOW JSON (Import This)</div>
          <pre className="cb" style={{fontSize:11,maxHeight:180,overflowY:"auto"}}>{`{
  "nodes": [
    {
      "name": "Telegram Trigger",
      "type": "n8n-nodes-base.telegramTrigger",
      "parameters": {
        "updates": ["message"]
      }
    },
    {
      "name": "Claude AI",
      "type": "n8n-nodes-base.httpRequest",
      "parameters": {
        "url": "https://cc.freemodel.dev/v1/messages",
        "method": "POST",
        "headers": {
          "x-api-key": "YOUR_API_KEY",
          "anthropic-version": "2023-06-01"
        },
        "body": {
          "model": "claude-sonnet-4-6",
          "max_tokens": 1024,
          "system": "You are Lumis, a helpful AI.",
          "messages": [{
            "role": "user",
            "content": "={{$json.message.text}}"
          }]
        }
      }
    },
    {
      "name": "Send Reply",
      "type": "n8n-nodes-base.telegram",
      "parameters": {
        "operation": "sendMessage",
        "chatId": "={{$json.message.chat.id}}",
        "text": "={{$('Claude AI').item.json.content[0].text}}"
      }
    }
  ]
}`}</pre>
          <div style={{fontSize:12,color:"var(--muted)",marginTop:8}}>Replace YOUR_API_KEY with your OpenClaude key</div>
        </div>

        {/* Actions */}
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          <button onClick={save} className="btn-g" style={{flex:1,justifyContent:"center"}}>
            {saved?<><I n="check" s={14} c="#fff"/> Saved!</>:<><I n="key" s={14} c="#fff"/> Save Settings</>}
          </button>
          <button onClick={setWebhook} className="btn-b" disabled={loading||!token||!n8nUrl} style={{flex:1,justifyContent:"center"}}>
            {loading?<Spin s={14} c="var(--blue)"/>:<><I n="n8n" s={14}/> Set Webhook</>}
          </button>
        </div>

        {webhookRes&&(
          <div style={{padding:"10px 14px",background:webhookRes.startsWith("✅")?"rgba(63,185,80,.08)":"rgba(248,81,73,.08)",border:`1px solid ${webhookRes.startsWith("✅")?"rgba(63,185,80,.2)":"rgba(248,81,73,.2)"}`,borderRadius:10,fontSize:13,color:webhookRes.startsWith("✅")?"var(--green)":"var(--red)"}}>
            {webhookRes}
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════
   SETTINGS
════════════════════════════════════ */
function Settings({onBack,onLock}) {
  const [s,setS] = useState(loadSettings());
  const [saved,setSaved] = useState(false);
  const [showKey,setShowKey] = useState(false);
  const [newPw,setNewPw] = useState("");
  const [confirmPw,setConfirmPw] = useState("");
  const [pwMsg,setPwMsg] = useState("");

  function save() {
    saveSettings(s);
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  }

  function changePw() {
    if(newPw.length<4){setPwMsg("Min 4 chars");return;}
    if(newPw!==confirmPw){setPwMsg("Don't match");return;}
    saveSettings({...loadSettings(),password:newPw});
    setPwMsg("✓ Password changed!"); setNewPw(""); setConfirmPw("");
    setTimeout(()=>setPwMsg(""),2500);
  }

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <div className="topbar">
        <button className="back" onClick={onBack}><I n="arrl" s={14} c="var(--muted)"/> Home</button>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:400,color:"#e6edf3",flex:1}}>Settings</span>
        <button onClick={onLock} className="btn-o" style={{fontSize:12,padding:"7px 12px"}}><I n="lock" s={13}/> Lock</button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:16,WebkitOverflowScrolling:"touch"}}>

        {/* OpenClaude API */}
        <div className="card" style={{padding:18,marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--green)",letterSpacing:"1px",marginBottom:12}}>🤖 OPENCLAUDE API</div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--muted)",display:"block",marginBottom:5}}>API BASE URL</label>
            <input className="inp" value={s.apiBase||"https://cc.freemodel.dev"} onChange={e=>setS({...s,apiBase:e.target.value})} placeholder="https://cc.freemodel.dev"/>
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--muted)",display:"block",marginBottom:5}}>API KEY</label>
            <div style={{position:"relative"}}>
              <input className="inp" type={showKey?"text":"password"} value={s.apiKey||""} onChange={e=>setS({...s,apiKey:e.target.value})} placeholder="fe_oa_..." style={{paddingRight:40}}/>
              <button onClick={()=>setShowKey(!showKey)} style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",padding:4}}>
                <I n={showKey?"eyeoff":"eye"} s={15} c="var(--muted)"/>
              </button>
            </div>
            {s.apiKey&&<div style={{fontSize:11,color:"var(--green)",marginTop:3}}>✓ Key saved</div>}
          </div>
          <div>
            <label style={{fontSize:12,color:"var(--muted)",display:"block",marginBottom:5}}>MODEL</label>
            <select className="inp" value={s.model||"claude-sonnet-4-6"} onChange={e=>setS({...s,model:e.target.value})} style={{cursor:"pointer"}}>
              <option value="claude-sonnet-4-6">claude-sonnet-4-6 (Recommended)</option>
              <option value="claude-opus-4-6">claude-opus-4-6 (Most Powerful)</option>
              <option value="claude-haiku-4-5-20251001">claude-haiku-4-5-20251001 (Fast)</option>
            </select>
          </div>
        </div>

        {/* Gmail */}
        <div className="card" style={{padding:18,marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--orange)",letterSpacing:"1px",marginBottom:12}}>📧 GMAIL SMTP</div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--muted)",display:"block",marginBottom:5}}>GMAIL ADDRESS</label>
            <input className="inp" value={s.gmailUser||"lumis.chat@gmail.com"} onChange={e=>setS({...s,gmailUser:e.target.value})} placeholder="you@gmail.com"/>
          </div>
          <div>
            <label style={{fontSize:12,color:"var(--muted)",display:"block",marginBottom:5}}>APP PASSWORD</label>
            <input className="inp" type="password" value={s.gmailPass||""} onChange={e=>setS({...s,gmailPass:e.target.value})} placeholder="xxxx xxxx xxxx xxxx"/>
          </div>
          <div style={{marginTop:8,fontSize:11.5,color:"var(--muted)",lineHeight:1.6}}>
            Note: Gmail credentials are sent to backend API only. Never exposed in frontend.
          </div>
        </div>

        {/* Password */}
        <div className="card" style={{padding:18,marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--purple)",letterSpacing:"1px",marginBottom:12}}>🔒 LOCK SCREEN PASSWORD</div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--muted)",display:"block",marginBottom:5}}>NEW PASSWORD</label>
            <input className="inp" type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="New password"/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,color:"var(--muted)",display:"block",marginBottom:5}}>CONFIRM</label>
            <input className="inp" type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} placeholder="Confirm" onKeyDown={e=>e.key==="Enter"&&changePw()}/>
          </div>
          {pwMsg&&<div style={{fontSize:13,color:pwMsg.startsWith("✓")?"var(--green)":"var(--red)",marginBottom:10}}>{pwMsg}</div>}
          <button onClick={changePw} className="btn-b" style={{fontSize:13,padding:"8px 14px"}}><I n="lock" s={13}/> Change Password</button>
        </div>

        <button onClick={save} className="btn-g" style={{width:"100%",justifyContent:"center",padding:"13px",fontSize:15,marginBottom:20}}>
          {saved?<><I n="check" s={14} c="#fff"/> Saved!</>:"Save All Settings"}
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════
   HOME / OVERVIEW
════════════════════════════════════ */
function Home({setView}) {
  const s = loadSettings();
  const connected = !!s.apiKey;

  const tiles = [
    {id:"research",i:"search",l:"Open Research",d:"Wikipedia + DuckDuckGo + AI — no API needed",c:"var(--blue)",bg:"var(--blue-s)",badge:"Free"},
    {id:"terminal",i:"term",l:"Claude Terminal",d:"Full AI chat with image upload & code",c:"var(--green)",bg:"var(--green-s)",badge:connected?"Connected":"Setup needed"},
    {id:"bot",i:"bot",l:"Telegram + n8n",d:"Connect your bot via n8n workflow",c:"var(--orange)",bg:"var(--orange-s)",badge:"n8n"},
    {id:"settings",i:"set",l:"Settings",d:"API key, Gmail, password",c:"var(--purple)",bg:"var(--purple-s)",badge:null},
  ];

  return (
    <div style={{height:"100%",overflowY:"auto",padding:20,WebkitOverflowScrolling:"touch"}}>
      {/* Header */}
      <div style={{marginBottom:28}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
          <div style={{width:40,height:40,borderRadius:12,background:"rgba(63,185,80,.1)",border:"1px solid rgba(63,185,80,.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <I n="leaf" s={20} c="var(--green)"/>
          </div>
          <div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:400,color:"#e6edf3",lineHeight:1}}>Lumis</div>
            <div style={{fontSize:11,color:"var(--muted)",letterSpacing:".5px"}}>Personal AI · OpenClaude · n8n</div>
          </div>
        </div>

        {/* Status */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:12}}>
          <span className={`pill ${connected?"pill-g":"pill-r"}`}>
            <span style={{width:5,height:5,borderRadius:99,background:connected?"var(--green)":"var(--red)",display:"inline-block"}}/>
            {connected?"Claude Connected":"API Key Missing"}
          </span>
          <span className="pill pill-b"><I n="globe" s={9}/> Web Research Ready</span>
          <span className="pill pill-o"><I n="bot" s={9}/> Telegram via n8n</span>
        </div>
      </div>

      {/* Tiles */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
        {tiles.map((t,i)=>(
          <div key={t.id} className="card hc fu" onClick={()=>setView(t.id)}
            style={{padding:18,animationDelay:`${i*.06}s`,cursor:"pointer"}}>
            <div style={{width:38,height:38,borderRadius:11,background:t.bg,border:`1px solid ${t.c}25`,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:12}}>
              <I n={t.i} s={17} c={t.c}/>
            </div>
            <div style={{fontSize:14,fontWeight:600,color:"#e6edf3",marginBottom:4,lineHeight:1.2}}>{t.l}</div>
            <div style={{fontSize:11.5,color:"var(--muted)",lineHeight:1.5,marginBottom:8}}>{t.d}</div>
            {t.badge&&<span className={`pill ${t.id==="terminal"&&connected?"pill-g":t.id==="terminal"?"pill-r":t.id==="bot"?"pill-o":"pill-p"}`} style={{fontSize:10}}>{t.badge}</span>}
          </div>
        ))}
      </div>

      {/* Quick tips */}
      {!connected&&(
        <div style={{background:"rgba(248,81,73,.06)",border:"1px solid rgba(248,81,73,.15)",borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--red)",marginBottom:8,letterSpacing:".5px"}}>SETUP NEEDED</div>
          <div style={{fontSize:13,color:"#c9d1d9",lineHeight:1.7}}>
            1. Go to <strong>Settings</strong><br/>
            2. Add your <strong>OpenClaude API key</strong><br/>
            3. Set base URL: <code style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,background:"var(--bg3)",padding:"1px 5px",borderRadius:4}}>https://cc.freemodel.dev</code><br/>
            4. Done — Claude Terminal is ready!
          </div>
        </div>
      )}

      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:12,padding:16}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--muted)",marginBottom:10,letterSpacing:".5px"}}>QUICK GUIDE</div>
        {[
          {i:"search",c:"var(--blue)",t:"Research = No API",d:"Search works instantly, no setup"},
          {i:"term",c:"var(--green)",t:"Terminal = OpenClaude",d:"Add API key in Settings first"},
          {i:"img",c:"var(--purple)",t:"Image Analysis",d:"Upload any image in Terminal"},
          {i:"bot",c:"var(--orange)",t:"Telegram via n8n",d:"Setup n8n workflow + bot token"},
        ].map(({i,c,t,d})=>(
          <div key={t} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
            <div style={{width:28,height:28,borderRadius:8,background:`${c}15`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><I n={i} s={13} c={c}/></div>
            <div><div style={{fontSize:13,fontWeight:500,color:"#e6edf3"}}>{t}</div><div style={{fontSize:12,color:"var(--muted)"}}>{d}</div></div>

        ))}
      </div>
    </div>

}

/* ════════════════════════════════════
   ROOT APP
════════════════════════════════════ */
function App() {
  const [locked,setLocked] = useState(true);
  const [view,setView] = useState("home");
  const [sbOpen,setSbOpen] = useState(false);

  const nav = [
    {id:"home",i:"home",l:"Home"},
    {id:"research",i:"search",l:"Research"},
    {id:"terminal",i:"term",l:"Claude Terminal"},
    {id:"bot",i:"bot",l:"Telegram + n8n"},
    {id:"settings",i:"set",l:"Settings"},
  ];

  function panel() {
    const ob = {onBack:()=>setView("home")};
    switch(view) {
      case "home":     return <Home setView={setView}/>;
      case "research": return <Research {...ob}/>;
      case "terminal": return <Terminal {...ob}/>;
      case "bot":      return <BotPanel {...ob}/>;
      case "settings": return <Settings {...ob} onLock={()=>setLocked(true)}/>;
      default: return <Home setView={setView}/>;
    }
  }

  if(locked) return <LockScreen onUnlock={()=>setLocked(false)}/>;

  return (
    <div style={{width:"100%",height:"100vh",display:"flex",flexDirection:"column",background:"var(--bg)",overflow:"hidden",fontFamily:"'Outfit',sans-serif",color:"#e6edf3"}}>

      {sbOpen&&<div className="ov" onClick={()=>setSbOpen(false)}/>}

      {/* Sidebar */}
      <aside className={`sb${sbOpen?" open":""}`}>
        <div style={{padding:"18px 16px 14px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:10,background:"rgba(63,185,80,.1)",border:"1px solid rgba(63,185,80,.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <I n="leaf" s={17} c="var(--green)"/>
            </div>
            <div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:400,color:"#e6edf3",lineHeight:1.1}}>Lumis</div>
              <div style={{fontSize:9.5,color:"var(--muted)",letterSpacing:".7px"}}>PERSONAL AI</div>
            </div>
          </div>
          <button onClick={()=>setSbOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--muted)",padding:6,borderRadius:7,touchAction:"manipulation"}}>
            <I n="x" s={18}/>
          </button>
        </div>
        <nav style={{flex:1,overflowY:"auto",padding:"8px 10px"}}>
          {nav.map(x=>(
            <div key={x.id} className={`ni${view===x.id?" on":""}`} onClick={()=>{setView(x.id);setSbOpen(false);}}>
              <I n={x.i} s={15} c={view===x.id?"var(--green)":"var(--muted)"}/>{x.l}
            </div>
          ))}
        </nav>
        <div style={{padding:"12px 14px",borderTop:"1px solid var(--border)",display:"flex",gap:8}}>
          <button onClick={()=>setLocked(true)} className="btn-o" style={{flex:1,justifyContent:"center",fontSize:12,padding:"8px"}}>
            <I n="lock" s={13}/> Lock
          </button>
        </div>
      </aside>

      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",height:"100vh"}}>
        {/* Top bar — only on home */}
        {view==="home"&&(
          <div className="topbar" style={{borderBottom:"1px solid var(--border)"}}>
            <button onClick={()=>setSbOpen(true)} style={{background:"none",border:"none",cursor:"pointer",color:"#e6edf3",padding:8,borderRadius:8,touchAction:"manipulation"}}>
              <I n="menu" s={21}/>
            </button>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:"#e6edf3",flex:1}}>Lumis</span>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:7,height:7,borderRadius:99,background:"var(--green)"}}/>
              <span style={{fontSize:11,color:"var(--muted)"}}>AI</span>
            </div>
          </div>
        )}
        <div style={{flex:1,overflow:"hidden",position:"relative"}}>
          {panel()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
